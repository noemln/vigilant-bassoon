<style>
/* ── Reset & base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#fafaf8;
  --border:#e4e2dc;--border2:#cdcbc4;
  --text:#18170f;--text2:#64625a;--text3:#9e9b93;
  --accent:#1a5c3a;--accent-h:#145030;--accent-light:#e6f2ec;--accent-mid:#2d7a52;
  --warn-bg:#fff7e0;--warn:#8a5c09;
  --info-bg:#e6eefb;--info:#1a44a8;
  --success-bg:#e6f2ec;--success:#1a5c3a;
  --danger-bg:#fce8e8;--danger:#b01c1c;
  --r:6px;--rl:10px;--rxl:14px;
  --font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
}
[data-theme="dark"]{
  --bg:#111318;--surface:#1c1f2a;--surface2:#22263a;
  --border:#2e3248;--border2:#3c4060;
  --text:#e6e4dc;--text2:#8e8c84;--text3:#5a5850;
  --accent:#2d8a5a;--accent-h:#247a4e;--accent-light:#1a2e24;--accent-mid:#3a9e6a;
  --warn-bg:#2a2010;--warn:#d4960a;
  --info-bg:#0f1e3a;--info:#5b8fe8;
  --success-bg:#0f2018;--success:#2d8a5a;
  --danger-bg:#2a0f0f;--danger:#e05252;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;min-height:100vh}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}

/* ── Form elements ── */
input,select,textarea{
  font-family:var(--font);font-size:14px;border-radius:var(--r);
  border:1px solid var(--border2);background:var(--surface);
  color:var(--text);padding:9px 12px;outline:none;
  transition:border-color .15s,box-shadow .15s;
  width:100%;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(26,92,58,.12);
}
textarea{resize:vertical;font-family:var(--font)}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}

/* ── Buttons ── */
button{
  font-family:var(--font);font-size:14px;font-weight:500;
  cursor:pointer;border-radius:var(--r);
  border:1px solid var(--border2);background:var(--surface);
  color:var(--text);padding:8px 16px;
  transition:background .12s,border-color .12s,box-shadow .12s;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
}
button:hover:not(:disabled){background:var(--bg)}
button:active:not(:disabled){transform:scale(.99)}
button.pri{background:var(--accent);color:#fff;border-color:var(--accent)}
button.pri:hover:not(:disabled){background:var(--accent-h);border-color:var(--accent-h)}
button.danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}
button.danger:hover:not(:disabled){background:#f8d0d0}
button.ghost{border-color:transparent;background:transparent}
button.ghost:hover:not(:disabled){background:var(--bg)}
button:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── Sidebar ── */
.sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);min-height:calc(100vh - 60px);display:flex;flex-direction:column;padding:12px 0}
.sidebar-section{padding:8px 14px 4px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:transparent;width:100%;text-align:left;border-radius:0;transition:background .12s,color .12s}
.sidebar-item:hover:not(:disabled){background:var(--bg);color:var(--text)}
.sidebar-item.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.sidebar-item i{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sidebar-proj{margin:6px 10px;padding:10px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);cursor:pointer}
.sidebar-proj:hover{border-color:var(--accent);background:var(--accent-light)}
.content-area{flex:1;min-width:0;padding:28px;max-width:1300px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow)}
.card-inset{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r)}
.sg{display:flex;flex-direction:column;gap:14px}
.sg2{display:flex;flex-direction:column;gap:8px}
.row{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;font-size:12px;font-weight:500;padding:3px 10px;border-radius:99px;white-space:nowrap;gap:4px}
.badge-warn{background:var(--warn-bg);color:var(--warn)}
.badge-info{background:var(--info-bg);color:var(--info)}
.badge-success{background:var(--success-bg);color:var(--success)}
.badge-danger{background:var(--danger-bg);color:var(--danger)}
.badge-gray{background:#ededea;color:var(--text2)}
.badge-admin{background:#1a5c3a;color:#fff}

/* ── Table ── */
table{border-collapse:collapse;width:100%}
th{text-align:left;font-size:12px;color:var(--text2);font-weight:600;
   text-transform:uppercase;letter-spacing:.06em;
   padding:11px 14px;border-bottom:1px solid var(--border);
   background:var(--surface2);white-space:nowrap}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:top}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface2)}

/* ── Nav tabs ── */
.tab{font-size:14px;padding:7px 16px;cursor:pointer;background:transparent;
     border:1px solid transparent;border-radius:var(--r);font-weight:400;
     color:var(--text2);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.tab.active{background:var(--surface);border-color:var(--border2);font-weight:500;color:var(--text);box-shadow:var(--shadow)}

/* ── Upload drop zone ── */
.dropzone{border:1.5px dashed var(--border2);border-radius:var(--r);padding:24px;
          text-align:center;cursor:pointer;transition:border-color .15s,background .15s;
          color:var(--text2);font-size:14px;background:var(--surface)}
.dropzone:hover,.dropzone.over{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-item{background:var(--text);color:#fff;padding:11px 18px;border-radius:var(--r);
            font-size:14px;opacity:0;transform:translateY(8px);
            transition:opacity .25s,transform .25s;pointer-events:none}
.toast-item.show{opacity:1;transform:translateY(0)}
.toast-item.success{background:var(--accent)}
.toast-item.error{background:var(--danger)}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);
          display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
.modal{background:var(--surface);border-radius:var(--rxl);padding:28px;
       width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}

/* ── Divider ── */
.divider{height:1px;background:var(--border);margin:4px 0}

/* ── Stat card ── */
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);
           padding:18px 20px;flex:1;min-width:130px;box-shadow:var(--shadow)}
</style>
</head>

const MS_CLIENT_ID = '76a441a6-d465-4040-921d-7be28accc728';

/* Subjects that the portal itself sends — we EXCLUDE these from the email log */
const PORTAL_SUBJECT_FILTERS = [
  '[action required] submittal',
  '[submittal approved]',

function isPortalEmail(subject=''){
  const s = subject.toLowerCase();
  return PORTAL_SUBJECT_FILTERS.some(f => s.includes(f));

let _msalApp = null;
function getMsalApp(){
  if(_msalApp) return _msalApp;
  const lib = window.msal || window.msalBrowser;
  if(!lib || !lib.PublicClientApplication) throw new Error('MSAL library failed to load. Check your internet connection and try refreshing.');
  _msalApp = new lib.PublicClientApplication({
    auth:{
      clientId: MS_CLIENT_ID,
      authority:'https://login.microsoftonline.com/common',
      redirectUri: window.location.href.split('?')[0].split('#')[0],
    },
    cache:{ cacheLocation:'localStorage', storeAuthStateInCookie:false },
  });
  return _msalApp;
}

async function msSignIn(){
  const app = getMsalApp();
  await app.initialize();
  const result = await app.loginPopup({ scopes: MS_SCOPES });
  return result.account;
}

async function msSignOut(){
  const app = getMsalApp();
  await app.initialize();
  const accounts = app.getAllAccounts();
  if(accounts.length) await app.logoutPopup({ account: accounts[0] });
}

async function msGetToken(){
  const app = getMsalApp();
  await app.initialize();
  const accounts = app.getAllAccounts();
  if(!accounts.length) return null;
  try{
    const r = await app.acquireTokenSilent({ scopes: MS_SCOPES, account: accounts[0] });
    return r.accessToken;
  }catch{
    const r = await app.acquireTokenPopup({ scopes: MS_SCOPES, account: accounts[0] });
    return r.accessToken;
  }
}

async function msGetCurrentAccount(){
  const app = getMsalApp();
  await app.initialize();
  const accounts = app.getAllAccounts();
  return accounts[0] || null;
}

async function graphFetch(endpoint, token){
  const res = await fetch('https://graph.microsoft.com/v1.0' + endpoint, {
    headers:{ Authorization: 'Bearer ' + token }
  });
  if(!res.ok) throw new Error('Graph API error: ' + res.status);
  return res.json();
}

/* Fetch received + sent emails, merge, dedupe, filter portal notifications */
async function fetchSubmittalEmails(token, myEmail){
  const subjectFilter = encodeURIComponent(
    "contains(subject,'submittal') or contains(subject,'Submittal') or contains(subject,'SUBMITTAL')"
  );
  const fields = '$select=id,subject,from,toRecipients,receivedDateTime,bodyPreview,isRead&$top=100';

  const [inbox, sent] = await Promise.all([
    graphFetch(`/me/messages?$filter=${subjectFilter}&${fields}&$orderby=receivedDateTime desc`, token),
    graphFetch(`/me/sentItems?$filter=${subjectFilter}&${fields}&$orderby=receivedDateTime desc`, token),
  ]);

  const allEmails = [
    ...(inbox.value || []).map(e => ({ ...e, _direction:'received' })),
    ...(sent.value  || []).map(e => ({ ...e, _direction:'sent'     })),
  ];

  /* Remove portal-generated notification emails */
  const filtered = allEmails.filter(e => !isPortalEmail(e.subject));

  /* Dedupe by id */
  const seen = new Set();
  const deduped = filtered.filter(e => { if(seen.has(e.id)) return false; seen.add(e.id); return true; });

  /* Sort newest first */
  deduped.sort((a,b) => new Date(b.receivedDateTime) - new Date(a.receivedDateTime));
  return deduped;
}

      'Content-Type' : file.type || 'application/octet-stream',
    },
    body: file,
  });
  if(!res.ok){

  }
  if(onProgress) onProgress(100);

/* Check pending submittals and send reminder emails if due */
async function runNotificationCheck(submittals,users){
  if(!emailJsReady())return;
  const now=Date.now();
  const settings=await fbGetSettings();
  const intervalDays=settings.notifyIntervalDays||NOTIFY_INTERVAL_DAYS;
  const intervalMs=intervalDays*24*60*60*1000;
  const updated=[...submittals];
  let changed=false;

  for(let i=0;i<updated.length;i++){
    const s=updated[i];
    if(s.status!=='Pending'&&s.status!=='Under Review')continue;
    const lastNotified=s.lastNotified||s.dateSubmittedTs||0;
    if(now-lastNotified<intervalMs)continue;

    const recipient=users[s.sendTo];
    if(!recipient?.email)continue;

    const subject=`[Action Required] Submittal #${s.no} – ${s.sectionTitle}`;
    const body=`Hi ${recipient.name},\n\nYou have a submittal pending your review:\n\n`+
      `  Submittal #:  ${s.no}\n`+
      `  Section:      ${s.specSection} – ${s.sectionTitle}\n`+
      `  Description:  ${s.description}\n`+
      `  Submitted by: ${s.submittedBy} (${s.company})\n`+
      `  Date:         ${s.dateSubmitted}\n\n`+
      `Please log in to the portal to review and approve or return this submittal https://noemln.github.io/EsaSubmittal-Portal/.\n\n`+
      `${PROJECT}\n${OWNER}`;

    const ok=await sendEmail(recipient.email,recipient.name,subject,body);
    if(ok){
      updated[i]={...s,lastNotified:now};
      changed=true;
    }
  }
  if(changed)await fbSetSubmittals(updated);
  return updated;
}

function toBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

function fmtDate(ts){
  return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function daysSince(ts){
  return Math.floor((Date.now()-ts)/(1000*60*60*24));
}

function FileDropZone({onFile,file}){
  const [over,setOver]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [progress,setProgress]=useState('');
  const inp=useRef();
  const handle=async f=>{
    if(!f)return;
    if(f.size>50*1024*1024){toast('File must be under 50 MB.','error');return;}
    setUploading(true);
    setProgress('Uploading…');
    try{
      const attachment=await uploadToSupabase(f, pct=>setProgress('Uploading… '+pct+'%'));
      onFile(attachment);
      setProgress('');
    }catch(e){
      console.error(e);
      toast('Upload failed — '+e.message,'error');
      setProgress('');
    }
    setUploading(false);
  };
  return React.createElement('div',null,
    React.createElement('div',{
      className:'dropzone'+(over?' over':''),
      onClick:()=>!uploading&&inp.current.click(),
      onDragOver:e=>{e.preventDefault();setOver(true)},
      onDragLeave:()=>setOver(false),
      onDrop:e=>{e.preventDefault();setOver(false);handle(e.dataTransfer.files[0])},
      style:{cursor:uploading?'wait':'pointer'},
    },
      uploading
        ?React.createElement('div',{style:{color:'var(--accent)',display:'flex',alignItems:'center',gap:8,justifyContent:'center'}},
            React.createElement('span',{style:{display:'inline-block',width:16,height:16,border:'2px solid var(--accent-light)',borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin .6s linear infinite'}}),
            React.createElement('span',null,progress||'Uploading…'))
        :file
          ?React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8,justifyContent:'center',color:'var(--accent)'}},
              React.createElement('i',{className:'ti ti-paperclip',style:{fontSize:16}}),
              React.createElement('span',{style:{fontWeight:500}},file.name),
              React.createElement('span',{style:{color:'var(--text3)',fontSize:11}},'('+Math.round(file.size/1024)+' KB · ☁ Supabase)'),
              React.createElement('button',{onClick:e=>{e.stopPropagation();onFile(null);},
                style:{border:'none',background:'none',color:'var(--danger)',padding:'2px 6px',fontSize:13,cursor:'pointer'}},'✕'))
          :React.createElement('div',null,
              React.createElement('i',{className:'ti ti-upload',style:{fontSize:20,display:'block',marginBottom:4}}),
              'Click or drag to attach a file',
              React.createElement('div',{style:{fontSize:11,marginTop:2,color:'var(--text3)'}},
                'PDF, DWG, images and more — up to 50 MB via Supabase Storage'))
    ),
    React.createElement('input',{ref:inp,type:'file',style:{display:'none'},onChange:e=>handle(e.target.files[0])})
  );
}

/* Helper: detect stale Cloudinary URLs */
function isCloudinaryUrl(url){ return url&&url.includes('cloudinary.com'); }

/* Helper: get the best download URL for an attachment */
function getDownloadUrl(attachment){
  if(!attachment)return null;
  const url=attachment.downloadUrl||attachment.url||null;
  if(isCloudinaryUrl(url))return null;
  return url;
}
function getViewUrl(attachment){
  if(!attachment)return null;
  const url=attachment.url||null;
  if(isCloudinaryUrl(url))return null;
  return url;
}

function FileDownloadBtn({attachment}){
  if(!attachment)return null;

  const viewUrl=getViewUrl(attachment);
  const dlUrl=getDownloadUrl(attachment);
  const isLegacy=!viewUrl&&!dlUrl&&(attachment.url||attachment.downloadUrl);

  /* Legacy Cloudinary file — was uploaded before Supabase switch */
  if(isLegacy){
    return React.createElement('div',{style:{display:'inline-flex',alignItems:'center',gap:6,
      fontSize:11,color:'var(--warn)',padding:'4px 10px',border:'1px solid var(--warn)',
      borderRadius:'var(--r)',background:'var(--warn-bg)'}},
      React.createElement('i',{className:'ti ti-alert-triangle',style:{fontSize:12}}),
      'File unavailable — re-upload required');
  }

  /* base64 legacy local file */
  if(!viewUrl&&!dlUrl&&attachment.data){
    const handleB64View=e=>{e.stopPropagation();const a=document.createElement('a');a.href=attachment.data;a.target='_blank';a.click();};
    const handleB64Dl=e=>{e.stopPropagation();const a=document.createElement('a');a.href=attachment.data;a.download=attachment.name;a.click();};

  }

  const handleView=e=>{e.stopPropagation();if(viewUrl)window.open(viewUrl,'_blank');};

    e.stopPropagation();
    if(dlUrl){const a=document.createElement('a');a.href=dlUrl;a.download=attachment.name;a.target='_blank';a.click();}

function SubmitForm({form,setForm,onSubmit,onAiAssist,submitting,aiLoading,user,allUsers,project}){
  const projectSections=(project?.specSections&&project.specSections.length>0)?project.specSections:SPEC_SECTIONS;
  const projectDivisions=[...new Set(projectSections.map(s=>s.div))];
  const grouped=projectDivisions.map(div=>{
    const s0=projectSections.find(s=>s.div===div);
    return{div,divName:s0?.divName||'',sections:projectSections.filter(s=>s.div===div)};
  });
  const selected=projectSections.find(s=>s.section===form.specSection);
  const ok=form.specSection&&form.description.trim()&&form.sendTo;
  /* Filter recipients to project members */
  const projectUserIds=project?.userIds;
  const recipients=allUsers.filter(u=>{
    if(u.id===user.id||u.isAdmin) return false;
    if(!projectUserIds||projectUserIds==='all') return true;
    return Array.isArray(projectUserIds)&&projectUserIds.includes(u.id);

function AdminPanel({submittals,onDeleteSubmittal,onSaveSubmittals}){
  const [users,setUsers]=useState({});
  const [resetModal,setResetModal]=useState(null);
  const [newPass,setNewPass]=useState('');
  const [confirmDel,setConfirmDel]=useState(null);
  const [notifStatus,setNotifStatus]=useState('');
  const [inlineEditId,setInlineEditId]=useState(null);
  const [inlineEditName,setInlineEditName]=useState('');
  const [notifDays,setNotifDays]=useState(NOTIFY_INTERVAL_DAYS);
  const [notifDaysSaving,setNotifDaysSaving]=useState(false);

  /* ── Projects & Specs ── */
  const [projects,setProjects]=useState({});
  const [projLoading,setProjLoading]=useState(true);
  const [showProjModal,setShowProjModal]=useState(false);
  const [editProjId,setEditProjId]=useState(null);
  const [projForm,setProjForm]=useState({name:'',description:'',color:'#1a5c3a'});
  const [projSaving,setProjSaving]=useState(false);
  const [projConfirmDel,setProjConfirmDel]=useState(null);
  const [showSpecModal,setShowSpecModal]=useState(null); /* {id,name,specs:[]} */
  const [specForm,setSpecForm]=useState({section:'',title:'',div:'',divName:''});
  const [specSaving,setSpecSaving]=useState(false);
  const [specConfirmDel,setSpecConfirmDel]=useState(null);
  const PROJ_COLORS=['#1a5c3a','#1a44a8','#8a3a00','#6a1a8a','#8a1a1a','#1a6a7a','#5a5a00'];

  const reloadUsers=useCallback(async()=>{const u=await fbGetUsers();setUsers(u);},[]);
  const reloadProjects=useCallback(async()=>{const p=await fbGetProjects();setProjects(p||{});setProjLoading(false);},[]);
  const reloadSettings=useCallback(async()=>{const s=await fbGetSettings();if(s.notifyIntervalDays)setNotifDays(s.notifyIntervalDays);},[]);
  useEffect(()=>{reloadUsers();reloadProjects();reloadSettings();},[reloadUsers,reloadProjects,reloadSettings]);

  const handleInlineRename=async(projId)=>{
    const trimmed=inlineEditName.trim();
    if(!trimmed){setInlineEditId(null);return;}
    const all=await fbGetProjects()||{};
    if(!all[projId]){setInlineEditId(null);return;}
    all[projId]={...all[projId],name:trimmed};
    await fbSetProjects(all);
    setProjects(all);
    setInlineEditId(null);
    toast('Project renamed.','success');
  };

  const handleSaveNotifDays=async(days)=>{
    setNotifDaysSaving(true);
    const s=await fbGetSettings();
    await fbSetSettings({...s,notifyIntervalDays:days});
    setNotifDaysSaving(false);
    toast('Reminder interval updated to '+days+' day'+(days!==1?'s':'')+'.','success');
  };

  const handleResetPass=async()=>{
    if(!newPass||newPass.length<6){toast('Password must be at least 6 characters.','error');return;}
    const all=await fbGetUsers();
    all[resetModal.email]={...all[resetModal.email],passHash:btoa(unescape(encodeURIComponent(newPass)))};
    await fbSetUsers(all);
    setUsers(all);
    setResetModal(null);setNewPass('');
    toast('Password reset for '+resetModal.name,'success');
  };

  const handleDeleteUser=async key=>{
    const all=await fbGetUsers();
    delete all[key];
    await fbSetUsers(all);
    setUsers(all);
    setConfirmDel(null);
    toast('User removed.','success');
  };

  const handleSendReminders=async()=>{
    setNotifStatus('sending');
    const sub=await fbGetSubmittals();
    const u=await fbGetUsers();
    if(!emailJsReady()){toast('EmailJS not configured yet — see setup instructions.','error');setNotifStatus('');return;}
    let count=0;
    for(const s of sub){
      if(s.status!=='Pending'&&s.status!=='Under Review')continue;
      const r=u[s.sendTo]||Object.values(u).find(x=>x.id===s.sendTo);
      if(!r?.email)continue;
      const ok=await sendEmail(r.email,r.name,
        '[Action Required] Submittal #'+s.no+' – '+s.sectionTitle,
        'Hi '+r.name+',\n\nThis is a reminder that submittal #'+s.no+' ('+s.specSection+' – '+s.sectionTitle+') is pending your review.\n\nDescription: '+s.description+'\nSubmitted by: '+s.submittedBy+' ('+s.company+')\nDate: '+s.dateSubmitted+'\n\nPlease log in to the portal to complete your review:\nhttps://noemln.github.io/EsaSubmittal-Portal/\n\n'+PROJECT+'\n'+OWNER);
      if(ok)count++;
    }
    setNotifStatus('');
    toast(count>0?'Sent '+count+' reminder email'+(count!==1?'s':'')+'.':'No pending submittals with recipients.','success');
  };

  /* project CRUD */
  const openNewProj=()=>{setProjForm({name:'',description:'',color:'#1a5c3a'});setEditProjId(null);setShowProjModal(true);};
  const openEditProj=p=>{setProjForm({name:p.name,description:p.description||'',color:p.color||'#1a5c3a'});setEditProjId(p.id);setShowProjModal(true);};
  const handleSaveProj=async()=>{
    if(!projForm.name.trim()){toast('Project name is required.','error');return;}
    setProjSaving(true);
    const all=await fbGetProjects()||{};
    const id=editProjId||('proj_'+Date.now());
    if(!editProjId) all[id]={id,name:projForm.name.trim(),description:projForm.description.trim(),color:projForm.color,userIds:'all',specSections:[],createdAt:Date.now()};
    else all[id]={...all[id],name:projForm.name.trim(),description:projForm.description.trim(),color:projForm.color};
    await fbSetProjects(all);
    setProjects(all);
    setShowProjModal(false);setProjSaving(false);
    toast(editProjId?'Project updated.':'Project created.','success');
  };
  const handleDeleteProj=async id=>{
    const all=await fbGetProjects()||{};
    delete all[id];
    await fbSetProjects(all);
    setProjects(all);
    setProjConfirmDel(null);
    toast('Project deleted.','success');
  };

  /* spec CRUD */
  const openSpecModal=p=>{ setShowSpecModal({id:p.id,name:p.name,specs:[...(p.specSections||[])]}); setSpecForm({section:'',title:'',div:'',divName:''}); setSpecConfirmDel(null); };
  const handleAddSpec=async()=>{
    if(!specForm.section.trim()||!specForm.title.trim()){toast('Section number and title are required.','error');return;}
    setSpecSaving(true);
    const all=await fbGetProjects()||{};
    const proj=all[showSpecModal.id];

function ProfileModal({user,onClose,onUpdate}){
  const [tab,setTab]=useState('email');
  const [newEmail,setNewEmail]=useState(user.email||'');
  const [curPass,setCurPass]=useState('');
  const [newPass,setNewPass]=useState('');
  const [newPass2,setNewPass2]=useState('');
  const [err,setErr]=useState('');

  const saveEmail=async()=>{
    setErr('');
    const e=newEmail.trim().toLowerCase();
    if(!e)return setErr('Email cannot be empty.');
    if(e===user.email){onClose();return;}
    if(!curPass)return setErr('Enter your current password to confirm.');
    if(user.isAdmin){toast('Admin email cannot be changed.','error');return;}
    const all=await fbGetUsers();
    const rec=all[user.email];
    if(!rec)return setErr('Account not found.');
    if(rec.passHash!==btoa(unescape(encodeURIComponent(curPass))))return setErr('Current password is incorrect.');
    if(all[e]&&e!==user.email)return setErr('That email is already in use.');
    const updated={...rec,email:e};
    delete all[user.email];
    all[e]=updated;
    await fbSetUsers(all);
    onUpdate(updated);
    toast('Email updated.','success');
    onClose();
  };

  const savePass=async()=>{
    setErr('');
    if(!curPass)return setErr('Enter your current password.');
    if(newPass.length<6)return setErr('New password must be at least 6 characters.');
    if(newPass!==newPass2)return setErr('New passwords do not match.');
    if(user.isAdmin){toast('Admin password cannot be changed here.','error');return;}
    const all=await fbGetUsers();
    const rec=all[user.email];
    if(!rec)return setErr('Account not found.');
    if(rec.passHash!==btoa(unescape(encodeURIComponent(curPass))))return setErr('Current password is incorrect.');
    all[user.email]={...rec,passHash:btoa(unescape(encodeURIComponent(newPass)))};
    await fbSetUsers(all);
    toast('Password updated.','success');
    onClose();
  };

  const tabBtn=(id,label)=>React.createElement('button',{
    onClick:()=>{setTab(id);setErr('');},
    style:{flex:1,padding:'8px',fontSize:13,border:'none',borderRadius:'var(--r)',cursor:'pointer',
           background:tab===id?'var(--surface)':'transparent',
           fontWeight:tab===id?600:400,color:tab===id?'var(--text)':'var(--text2)',
           transition:'background .15s',boxShadow:tab===id?'0 1px 3px rgba(0,0,0,.08)':'none'}},label);

  return React.createElement('div',{className:'modal-bg',onClick:onClose},
    React.createElement('div',{className:'modal',onClick:e=>e.stopPropagation(),style:{maxWidth:420}},

          React.createElement('div',{style:{fontSize:12,color:'var(--text3)',marginTop:2}},user.name+' · '+user.company)),
        React.createElement('button',{className:'ghost',onClick:onClose,style:{fontSize:18,padding:'2px 8px',color:'var(--text3)'}},'✕')),
      React.createElement('div',{style:{display:'flex',gap:4,marginBottom:20,background:'var(--bg)',borderRadius:'var(--r)',padding:4}},
        tabBtn('email','Change Email'),
        tabBtn('password','Change Password')),
      err&&React.createElement('div',{style:{background:'var(--danger-bg)',color:'var(--danger)',borderRadius:'var(--r)',padding:'9px 12px',fontSize:12,marginBottom:14,display:'flex',alignItems:'center',gap:6}},
        React.createElement('i',{className:'ti ti-alert-circle',style:{fontSize:14}}),err),
      tab==='email'&&React.createElement('div',{className:'sg'},
        React.createElement('div',null,
          React.createElement('label',null,'New email address'),
          React.createElement('input',{type:'email',value:newEmail,onChange:e=>setNewEmail(e.target.value),placeholder:'you@company.com'})),
        React.createElement('div',null,
          React.createElement('label',null,'Current password (to confirm)'),
          React.createElement('input',{type:'password',value:curPass,onChange:e=>setCurPass(e.target.value),placeholder:'Your current password',
            onKeyDown:e=>e.key==='Enter'&&saveEmail()})),
        React.createElement('div',{style:{display:'flex',gap:10,justifyContent:'flex-end',marginTop:4}},
          React.createElement('button',{onClick:onClose},'Cancel'),
          React.createElement('button',{className:'pri',onClick:saveEmail},'Save email'))),
      tab==='password'&&React.createElement('div',{className:'sg'},

          React.createElement('label',null,'Current password'),

function DragAssignPanel({projects, allUsers, onProjectsChange}){
  const [dragUserId,setDragUserId]=useState(null);
  const [overProjectId,setOverProjectId]=useState(null);
  const [saving,setSaving]=useState(false);

  const nonAdminUsers=allUsers.filter(u=>!u.isAdmin);
  const projList=Object.values(projects);

  const getAssignedIds=(p)=>{
    if(p.userIds==='all')return nonAdminUsers.map(u=>u.id);
    return Array.isArray(p.userIds)?p.userIds:[];
  };

  const isAssigned=(p,uid)=>getAssignedIds(p).includes(uid);

  const assignUser=async(projectId,userId)=>{
    const all=await fbGetProjects()||{};
    const p=all[projectId];if(!p)return;
    if(p.userIds==='all')return;
    const cur=Array.isArray(p.userIds)?p.userIds:[];
    if(cur.includes(userId))return;
    all[projectId]={...p,userIds:[...cur,userId]};
    setSaving(true);
    await fbSetProjects(all);
    onProjectsChange(all);
    setSaving(false);
    toast('User assigned to project.','success');
  };

  const removeUser=async(projectId,userId)=>{
    const all=await fbGetProjects()||{};
    const p=all[projectId];if(!p)return;
    const cur=p.userIds==='all'?nonAdminUsers.map(u=>u.id):(Array.isArray(p.userIds)?p.userIds:[]);
    all[projectId]={...p,userIds:cur.filter(id=>id!==userId)};
    setSaving(true);
    await fbSetProjects(all);
    onProjectsChange(all);
    setSaving(false);
  };

  const toggleAll=async(projectId)=>{
    const all=await fbGetProjects()||{};
    const p=all[projectId];if(!p)return;
    all[projectId]={...p,userIds:p.userIds==='all'?[]:nonAdminUsers.map(u=>u.id)};
    setSaving(true);
    await fbSetProjects(all);
    onProjectsChange(all);
    setSaving(false);

          React.createElement('i',{className:'ti ti-users',style:{marginRight:5}}),'Team members'),
        React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:6}},
          nonAdminUsers.map(u=>
            React.createElement('div',{
              key:u.id,
              draggable:true,
              onDragStart:e=>{e.dataTransfer.setData('userId',u.id);setDragUserId(u.id);},
              onDragEnd:()=>{setDragUserId(null);setOverProjectId(null);},
              style:{

                borderRadius:'var(--r)',padding:'8px 10px',cursor:'grab',

                boxShadow:'var(--shadow)',transition:'opacity .15s',
                display:'flex',alignItems:'center',gap:8
              }},
              React.createElement(Avatar,{name:u.name,size:26}),
              React.createElement('div',{style:{minWidth:0}},
                React.createElement('div',{style:{fontSize:12,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},u.name),
                React.createElement('div',{style:{fontSize:10,color:'var(--text3)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},u.role)))))),

      /* ── Right: project columns ── */
      React.createElement('div',{style:{display:'flex',gap:12,flex:1,minWidth:0,overflowX:'auto'}},
        projList.map(p=>{

function ProjectsManageView({allUsers, currentProject, onSwitchProject}){
  const [projects,setProjects]=useState({});
  const [loading,setLoading]=useState(true);
  const [showAdd,setShowAdd]=useState(false);
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState({name:'',description:'',color:'#1a5c3a',userIds:'all',specSections:[]});
  const [secSearch,setSecSearch]=useState('');
  const [saving,setSaving]=useState(false);
  const [confirmDel,setConfirmDel]=useState(null);

  const reload=async()=>{const p=await fbGetProjects();setProjects(p||{});setLoading(false);};
  useEffect(()=>{reload();},[]);

  const openAdd=()=>{
    setForm({name:'',description:'',color:'#1a5c3a',userIds:'all',specSections:[]});
    setEditId(null);setShowAdd(true);setSecSearch('');

      specSections:(p.specSections||[]).map(s=>s.section)});
    setEditId(p.id);setShowAdd(true);setSecSearch('');
  };

  const toggleSection=sec=>{
    setForm(f=>{
      const cur=f.specSections;
      return {...f,specSections:cur.includes(sec)?cur.filter(s=>s!==sec):[...cur,sec]};
    });
  };

  const handleSave=async()=>{
    if(!form.name.trim()){toast('Project name is required.','error');return;}
    setSaving(true);
    const all=await fbGetProjects()||{};
    const id=editId||('proj_'+Date.now());
    const userIds=form.userIds==='all'?'all':form.userIds.split(',').map(s=>s.trim()).filter(Boolean);
    const specSections=SPEC_SECTIONS.filter(s=>form.specSections.includes(s.section));
    all[id]={...( all[id]||{}), id, name:form.name.trim(), description:form.description.trim(),
      color:form.color, userIds, specSections, createdAt:all[id]?.createdAt||Date.now()};

function App(){
  const [user,setUser]=useState(()=>{
    try{
      const s=LS.get('ep_session');
      if(s&&s.user&&s.expiry&&Date.now()<s.expiry)return s.user;
    }catch{}
    return null;
  });
  const [selectedProject,setSelectedProject]=useState(null);
  const [submittals,setSubmittals]=useState([]);
  const [allUsers,setAllUsers]=useState([]);
  const [view,setView]=useState('dashboard');
  const [reviewTarget,setReviewTarget]=useState(null);
  const [form,setForm]=useState({specSection:'',description:'',attachment:null,notes:'',sendTo:''});
  const [submitting,setSubmitting]=useState(false);
  const [aiLoading,setAiLoading]=useState(false);
  const [filterDiv,setFilterDiv]=useState('all');
  const [filterStatus,setFilterStatus]=useState('all');
  const [search,setSearch]=useState('');
  const [darkMode,setDarkMode]=useState(()=>LS.get('ep_dark')||false);
  const [profileOpen,setProfileOpen]=useState(false);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',darkMode?'dark':'');
    LS.set('ep_dark',darkMode);
  },[darkMode]);

  const load=useCallback(async()=>{
    const [subs,u]=await Promise.all([fbGetSubmittals(),fbGetUsers()]);
    setSubmittals(subs);
    setAllUsers(Object.values(u));
  },[]);

  /* Seed LCPS Tashiro project once */
  useEffect(()=>{fbEnsureLCPSTashiro();},[]);

  /* real-time listener: refresh whenever Firebase data changes */
  useEffect(()=>{
    if(!user)return;
    const refS=db.ref('ep_submittals');
    const refU=db.ref('ep_users');
    const onSubs=snap=>{if(snap.exists())setSubmittals(JSON.parse(snap.val()));};
    const onUsers=snap=>{if(snap.exists())setAllUsers(Object.values(JSON.parse(snap.val())));};
    refS.on('value',onSubs);
    refU.on('value',onUsers);
    return()=>{refS.off('value',onSubs);refU.off('value',onUsers);};
  },[user]);

  /* on login: load data, then run notification check */
  useEffect(()=>{
    if(!user)return;
    load();
    /* deferred notification check */
    setTimeout(async()=>{
      const sub=await fbGetSubmittals();
      const u=await fbGetUsers();
      const byId={};Object.values(u).forEach(x=>{byId[x.id]=x;byId[x.email]=x;});
      if(emailJsReady())runNotificationCheck(sub,byId);
    },2000);
  },[user,load]);

  const save=async s=>{await fbSetSubmittals(s);setSubmittals(s);};

  const handleSubmit=async()=>{
    if(!form.specSection||!form.description.trim()||!form.sendTo)return;
    setSubmitting(true);
    const section=SPEC_SECTIONS.find(s=>s.section===form.specSection);
    const recipient=allUsers.find(u=>u.id===form.sendTo);
    const ts=Date.now();
    const item={
      id:ts,no:String(submittals.length+1).padStart(3,'0'),
      projectId:selectedProject.id,
      specSection:form.specSection,sectionTitle:section?.title||'',division:section?.div||'',
      description:form.description.trim(),
      submittedBy:user.name,company:user.company,role:user.role,submittedById:user.id,
      sendTo:form.sendTo,sendToName:recipient?.name||'',sendToCompany:recipient?.company||'',
      dateSubmitted:fmtDate(ts),dateSubmittedTs:ts,
      status:'Pending',dateReviewed:'',reviewedBy:'',revision:'0',
      attachment:form.attachment||null,notes:form.notes.trim(),lastNotified:0,
    };
    const updated=[...submittals,item];
    save(updated);
    /* send initial notification */
    if(recipient?.email&&emailJsReady()){
      await sendEmail(recipient.email,recipient.name,
        '[New Submittal] #'+item.no+' – '+item.sectionTitle,
        'Hi '+recipient.name+',\n\nA new submittal has been sent to you for review:\n\n'+
        '  Submittal #:  '+item.no+'\n  Section:      '+item.specSection+' – '+item.sectionTitle+'\n'+
        '  Description:  '+item.description+'\n  Submitted by: '+user.name+' ('+user.company+')\n  Date:         '+item.dateSubmitted+
        '\n\nPlease log in to the portal to review this submittal:\nhttps://noemln.github.io/EsaSubmittal-Portal/\n\n'+PROJECT+'\n'+OWNER);
      await fbSetSubmittals(updated.map(s=>s.id===ts?{...s,lastNotified:ts}:s));
    }
    setForm({specSection:'',description:'',attachment:null,notes:'',sendTo:''});
    setView('log');
    setSubmitting(false);
    toast('Submittal #'+item.no+' submitted.','success');
  };

  const handleAiAssist=async()=>{
    if(!form.description)return;
    setAiLoading(true);
    try{
      const list=SPEC_SECTIONS.map(s=>s.section+': '+s.title).join('\n');
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:50,
          messages:[{role:'user',content:'Submittal: "'+form.description+'"\n\nSections:\n'+list+'\n\nReply ONLY with the 6-digit section number.'}]})});
      const data=await res.json();
      const match=data.content?.[0]?.text?.trim().match(/\d{6}/)?.[0];
      if(match&&SPEC_SECTIONS.find(s=>s.section===match))setForm(f=>({...f,specSection:match}));
    }catch{}
    setAiLoading(false);
  };

  const handleReview=async(id,status,notes)=>{
    const updated=submittals.map(s=>s.id!==id?s:{...s,status,
      dateReviewed:fmtDate(Date.now()),reviewedBy:user.name,notes:notes||s.notes});
    save(updated);
    const s=updated.find(x=>x.id===id);
    /* notify submitter of outcome */
    const submitter=allUsers.find(u=>u.id===s?.submittedById);
    if(submitter?.email&&emailJsReady()&&s){
      await sendEmail(submitter.email,submitter.name,
        '[Submittal '+status+'] #'+s.no+' – '+s.sectionTitle,
        'Hi '+submitter.name+',\n\nYour submittal has been reviewed:\n\n'+
        '  Submittal #:  '+s.no+'\n  Section:      '+s.specSection+' – '+s.sectionTitle+'\n'+
        '  Decision:     '+status+'\n  Reviewed by:  '+user.name+'\n'+
        (notes?'  Notes:       '+notes+'\n':'')+
        '\nhttps://noemln.github.io/EsaSubmittal-Portal/\n\n'+PROJECT+'\n'+OWNER);
    }
    toast('Review saved.','success');
  };

  const signIn=u=>{
    LS.set('ep_session',{user:u,expiry:Date.now()+SESSION_HOURS*60*60*1000});
    setUser(u);
  };
  const signOut=()=>{
    LS.set('ep_session',null);
    setUser(null);
  };

  if(!user)return React.createElement(AuthScreen,{onAuth:signIn});
  if(!selectedProject)return React.createElement(ProjectSelectScreen,{user,onSelect:p=>{setSelectedProject(p);setView('dashboard');}});

  const canReview=user.role==='Architect/Engineer'||user.role==='Owner'||user.role==='General Contractor'||user.isAdmin;

  /* Filter submittals to current project */
  const projectSubmittals=submittals.filter(s=>s.projectId===selectedProject.id);

  const stats={
    total:projectSubmittals.length,
    pending:projectSubmittals.filter(s=>s.status==='Pending').length,
    approved:projectSubmittals.filter(s=>s.status==='Approved'||s.status==='Approved as Noted').length,
    needsAction:projectSubmittals.filter(s=>s.status==='Revise & Resubmit'||s.status==='Rejected').length,
  };
  const filtered=projectSubmittals.filter(s=>{
    if(filterDiv!=='all'&&s.division!==filterDiv)return false;
    if(filterStatus!=='all'&&s.status!==filterStatus)return false;
    if(search&&!`${s.specSection} ${s.sectionTitle} ${s.description} ${s.submittedBy} ${s.company} ${s.sendToName}`.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });


  return React.createElement('div',{style:{fontFamily:'var(--font)',color:'var(--text)',minHeight:'100vh',background:'var(--bg)'}},
    /* Header */
    React.createElement('div',{style:{background:'var(--surface)',borderBottom:'1px solid var(--border)',padding:'0 20px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,boxShadow:'0 1px 0 rgba(0,0,0,.04)',height:56,position:'sticky',top:0,zIndex:100}},
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10}},
        React.createElement('img',{src:ESA_LOGO,alt:'ESA Construction',style:{height:36,width:'auto',objectFit:'contain',display:'block'}})),
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
        React.createElement('button',{
          onClick:()=>setDarkMode(d=>!d),
          title:darkMode?'Switch to light mode':'Switch to dark mode',
          style:{display:'inline-flex',alignItems:'center',gap:6,padding:'5px 11px',borderRadius:99,fontSize:12,fontWeight:500,
            cursor:'pointer',border:'1px solid var(--border2)',
            background:darkMode?'#1c1f2a':'#f0ede6',color:darkMode?'#e6e4dc':'#18170f',transition:'background .2s,color .2s'}},
          React.createElement('i',{className:'ti '+(darkMode?'ti-sun':'ti-moon'),style:{fontSize:13}}),
          darkMode?'Light':'Dark'),
        React.createElement('button',{className:'ghost',onClick:()=>setProfileOpen(true),
          style:{display:'flex',alignItems:'center',gap:8,padding:'4px 10px',borderRadius:'var(--r)',cursor:'pointer',border:'1px solid transparent'}},
          React.createElement(Avatar,{name:user.name,size:28,isAdmin:user.isAdmin}),
          React.createElement('div',{style:{textAlign:'right'}},
            React.createElement('div',{style:{fontSize:12,fontWeight:500}},user.name,
              user.isAdmin&&React.createElement('span',{className:'badge badge-admin',style:{marginLeft:6,fontSize:9}},'Admin')),
            React.createElement('div',{style:{fontSize:10,color:'var(--text3)'}},user.company))),
        React.createElement('button',{className:'ghost',onClick:signOut,style:{fontSize:12,padding:'5px 10px',color:'var(--text2)',borderRadius:'var(--r)'}},
          React.createElement('i',{className:'ti ti-logout',style:{fontSize:13}}), ' Sign out'))),
    /* Body: sidebar + content */
    React.createElement('div',{style:{display:'flex',minHeight:'calc(100vh - 56px)'}},
      /* Sidebar */
      React.createElement(Sidebar,{view,setView,user,project:selectedProject,
        onSwitchProject:()=>setSelectedProject(null),
        stats,submittals:projectSubmittals,allUsers,canReview}),
      /* Main content */
      React.createElement('div',{className:'content-area'},
        view==='dashboard'&&React.createElement(Dashboard,{stats,submittals:projectSubmittals,setView}),
        view==='submit'&&React.createElement(SubmitForm,{form,setForm,onSubmit:handleSubmit,onAiAssist:handleAiAssist,submitting,aiLoading,user,allUsers,project:selectedProject}),
        view==='log'&&React.createElement(LogView,{submittals:filtered,filterDiv,setFilterDiv,filterStatus,setFilterStatus,search,setSearch,canReview,
          isAdmin:user.isAdmin,
          onDelete:async id=>{const updated=submittals.filter(s=>s.id!==id);await save(updated);toast('Submittal deleted.','success');},
          onClickReview:s=>{setReviewTarget(s.id);setView('review');}}),
        view==='review'&&canReview&&React.createElement(ReviewView,{submittals:projectSubmittals,onReview:handleReview,scrollTo:reviewTarget,user}),
        view==='emails'&&React.createElement(EmailSyncView,null),
        view==='projects'&&user.isAdmin&&React.createElement(ProjectsManageView,{allUsers,currentProject:selectedProject,onSwitchProject:()=>setSelectedProject(null)}),
        view==='team'&&React.createElement(TeamView,{allUsers,currentUser:user}),
        view==='admin'&&user.isAdmin&&React.createElement(AdminPanel,{submittals,onSaveSubmittals:save}))),
    /* Profile modal */
    profileOpen&&React.createElement(ProfileModal,{user,onClose:()=>setProfileOpen(false),onUpdate:u=>{signIn(u);load();}}));
}

/* Spinner keyframe */
const style=document.createElement('style');
style.textContent='@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeInPop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}';
document.head.appendChild(style);

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
