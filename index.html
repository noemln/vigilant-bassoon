  font-family:var(--font);font-size:14px;border-radius:var(--r);
  border:1px solid var(--border2);background:var(--surface);
  color:var(--text);padding:9px 12px;outline:none;
  transition:border-color .15s,box-shadow .15s;
  width:100%;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(26,92,58,.12);
}
textarea{resize:vertical;font-family:var(--font)}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}

/* ── Buttons ── */

  font-family:var(--font);font-size:14px;font-weight:500;
  cursor:pointer;border-radius:var(--r);
  border:1px solid var(--border2);background:var(--surface);
  color:var(--text);padding:8px 16px;
  transition:background .12s,border-color .12s,box-shadow .12s;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
}
button:hover:not(:disabled){background:var(--bg)}
button:active:not(:disabled){transform:scale(.99)}
button.pri{background:var(--accent);color:#fff;border-color:var(--accent)}
button.pri:hover:not(:disabled){background:var(--accent-h);border-color:var(--accent-h)}
button.danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}
button.danger:hover:not(:disabled){background:#f8d0d0}
button.ghost{border-color:transparent;background:transparent}
button.ghost:hover:not(:disabled){background:var(--bg)}
button:disabled{opacity:.4;cursor:not-allowed;transform:none}

.badge-success{background:var(--success-bg);color:var(--success)}
.badge-danger{background:var(--danger-bg);color:var(--danger)}

async function uploadToSupabase(file, onProgress){
  if(!supabaseReady()) throw new Error('Supabase is not configured yet — see Admin panel setup instructions.');
  const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const path = Date.now() + '_' + Math.random().toString(36).slice(2) + '_' + safeName;

  const uploadUrl = `${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${path}`;
  if(onProgress) onProgress(10);
  const res = await fetch(uploadUrl, {
    method : 'POST',
    headers: {
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type' : file.type || 'application/octet-stream',
    },
    body: file,
  });
  if(!res.ok){
    const err = await res.json().catch(()=>({}));
    throw new Error(err.message || ('Upload failed — HTTP ' + res.status));
  }
  if(onProgress) onProgress(100);
  const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${path}`;
  const downloadUrl = publicUrl + '?download=' + encodeURIComponent(file.name);
  return { name: file.name, type: file.type, size: file.size, url: publicUrl, downloadUrl, storagePath: path };
}

function emailJsReady(){
  return EMAILJS_CONFIG.publicKey!=='YOUR_EMAILJS_PUBLIC_KEY';
}

async function sendEmail(toEmail,toName,subject,body){
  if(!emailJsReady()){
    console.warn('EmailJS not configured — skipping email to',toEmail);
    return false;
  }
  try{
    emailjs.init(EMAILJS_CONFIG.publicKey);
    await emailjs.send(EMAILJS_CONFIG.serviceId,EMAILJS_CONFIG.templateId,{
      to_email:toEmail,
      to_name:toName,
      subject,
      message:body,
      project:PROJECT,
      owner:OWNER,
    });
    return true;
  }catch(e){
    console.error('EmailJS error',e);
    return false;
  }
}

/* Check pending submittals and send reminder emails if due */
async function runNotificationCheck(submittals,users){
  if(!emailJsReady())return;
  const now=Date.now();
  const intervalMs=NOTIFY_INTERVAL_DAYS*24*60*60*1000;
  const updated=[...submittals];
  let changed=false;

  for(let i=0;i<updated.length;i++){
    const s=updated[i];
    if(s.status!=='Pending'&&s.status!=='Under Review')continue;
    const lastNotified=s.lastNotified||s.dateSubmittedTs||0;
    if(now-lastNotified<intervalMs)continue;

    const recipient=users[s.sendTo];
    if(!recipient?.email)continue;

    const subject=`[Action Required] Submittal #${s.no} – ${s.sectionTitle}`;
    const body=`Hi ${recipient.name},\n\nYou have a submittal pending your review:\n\n`+
      `  Submittal #:  ${s.no}\n`+
      `  Section:      ${s.specSection} – ${s.sectionTitle}\n`+
      `  Description:  ${s.description}\n`+
      `  Submitted by: ${s.submittedBy} (${s.company})\n`+
      `  Date:         ${s.dateSubmitted}\n\n`+
      `Please log in to the portal to review and approve or return this submittal https://noemln.github.io/vigilant-bassoon/.\n\n`+
      `${PROJECT}\n${OWNER}`;

    const ok=await sendEmail(recipient.email,recipient.name,subject,body);
    if(ok){
      updated[i]={...s,lastNotified:now};
      changed=true;
    }
  }
  if(changed)await fbSetSubmittals(updated);
  return updated;
}

function toBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

   ══════════════════════════════════════════════════════════════════ */
function FileDropZone({onFile,file}){
  const [over,setOver]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [progress,setProgress]=useState('');
  const inp=useRef();
  const handle=async f=>{
    if(!f)return;
    if(f.size>50*1024*1024){toast('File must be under 50 MB.','error');return;}
    setUploading(true);
    setProgress('Uploading…');
    try{
      const attachment=await uploadToSupabase(f, pct=>setProgress('Uploading… '+pct+'%'));
      onFile(attachment);
      setProgress('');
    }catch(e){
      console.error(e);
      toast('Upload failed — '+e.message,'error');
      setProgress('');
    }
    setUploading(false);
  };
  return React.createElement('div',null,
    React.createElement('div',{
      className:'dropzone'+(over?' over':''),
      onClick:()=>!uploading&&inp.current.click(),
      onDragOver:e=>{e.preventDefault();setOver(true)},
      onDragLeave:()=>setOver(false),
      onDrop:e=>{e.preventDefault();setOver(false);handle(e.dataTransfer.files[0])},
      style:{cursor:uploading?'wait':'pointer'},
    },
      uploading
        ?React.createElement('div',{style:{color:'var(--accent)',display:'flex',alignItems:'center',gap:8,justifyContent:'center'}},
            React.createElement('span',{style:{display:'inline-block',width:16,height:16,border:'2px solid var(--accent-light)',borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin .6s linear infinite'}}),
            React.createElement('span',null,progress||'Uploading…'))
        :file
          ?React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8,justifyContent:'center',color:'var(--accent)'}},
              React.createElement('i',{className:'ti ti-paperclip',style:{fontSize:16}}),
              React.createElement('span',{style:{fontWeight:500}},file.name),
              React.createElement('span',{style:{color:'var(--text3)',fontSize:11}},'('+Math.round(file.size/1024)+' KB · ☁ Supabase)'),
              React.createElement('button',{onClick:e=>{e.stopPropagation();onFile(null);},
                style:{border:'none',background:'none',color:'var(--danger)',padding:'2px 6px',fontSize:13,cursor:'pointer'}},'✕'))
          :React.createElement('div',null,
              React.createElement('i',{className:'ti ti-upload',style:{fontSize:20,display:'block',marginBottom:4}}),
              'Click or drag to attach a file',
              React.createElement('div',{style:{fontSize:11,marginTop:2,color:'var(--text3)'}},
                'PDF, DWG, images and more — up to 50 MB via Supabase Storage'))
    ),
    React.createElement('input',{ref:inp,type:'file',style:{display:'none'},onChange:e=>handle(e.target.files[0])})
  );
}

/* Helper: detect stale Cloudinary URLs */
function isCloudinaryUrl(url){ return url&&url.includes('cloudinary.com'); }

/* Helper: get the best download URL for an attachment */
function getDownloadUrl(attachment){
  if(!attachment)return null;
  const url=attachment.downloadUrl||attachment.url||null;
  if(isCloudinaryUrl(url))return null;
  return url;
}
function getViewUrl(attachment){
  if(!attachment)return null;
  const url=attachment.url||null;
  if(isCloudinaryUrl(url))return null;
  return url;
}

function FileDownloadBtn({attachment}){
  if(!attachment)return null;

  const viewUrl=getViewUrl(attachment);
  const dlUrl=getDownloadUrl(attachment);
  const isLegacy=!viewUrl&&!dlUrl&&(attachment.url||attachment.downloadUrl);

  /* Legacy Cloudinary file — was uploaded before Supabase switch */
  if(isLegacy){
    return React.createElement('div',{style:{display:'inline-flex',alignItems:'center',gap:6,
      fontSize:11,color:'var(--warn)',padding:'4px 10px',border:'1px solid var(--warn)',
      borderRadius:'var(--r)',background:'var(--warn-bg)'}},
      React.createElement('i',{className:'ti ti-alert-triangle',style:{fontSize:12}}),
      'File unavailable — re-upload required');
  }

  /* base64 legacy local file */
  if(!viewUrl&&!dlUrl&&attachment.data){
    const handleB64View=e=>{e.stopPropagation();const a=document.createElement('a');a.href=attachment.data;a.target='_blank';a.click();};
    const handleB64Dl=e=>{e.stopPropagation();const a=document.createElement('a');a.href=attachment.data;a.download=attachment.name;a.click();};
    return React.createElement('div',{style:{display:'inline-flex',gap:4,alignItems:'center',flexWrap:'wrap'}},
      React.createElement('button',{onClick:handleB64View,title:'Open in browser',style:{fontSize:11,padding:'3px 10px',color:'var(--info)',borderColor:'var(--info)'}},
        React.createElement('i',{className:'ti ti-eye',style:{fontSize:12}}),' View'),
      React.createElement('button',{onClick:handleB64Dl,title:'Download file',style:{fontSize:11,padding:'3px 10px',color:'var(--accent)',borderColor:'var(--accent)'}},
        React.createElement('i',{className:'ti ti-download',style:{fontSize:12}}),' Download'));
  }

  const handleView=e=>{e.stopPropagation();if(viewUrl)window.open(viewUrl,'_blank');};
  const handleDownload=e=>{
    e.stopPropagation();
    if(dlUrl){const a=document.createElement('a');a.href=dlUrl;a.download=attachment.name;a.target='_blank';a.click();}
  };

  return React.createElement('div',{style:{display:'inline-flex',gap:4,alignItems:'center',flexWrap:'wrap'}},
    viewUrl&&React.createElement('button',{onClick:handleView,title:'Open in browser',
      style:{fontSize:11,padding:'3px 10px',color:'var(--info)',borderColor:'var(--info)'}},
      React.createElement('i',{className:'ti ti-eye',style:{fontSize:12}}),
      ' View'),
    dlUrl&&React.createElement('button',{onClick:handleDownload,title:'Download file',
      style:{fontSize:11,padding:'3px 10px',color:'var(--accent)',borderColor:'var(--accent)'}},
      React.createElement('i',{className:'ti ti-download',style:{fontSize:12}}),
      ' Download'));
}

        React.createElement('div',{style:{fontSize:13,color:'var(--text2)',marginBottom:18}},'Setting new password for ',React.createElement('strong',null,resetModal.name)),
        React.createElement('div',{className:'sg2'},
          React.createElement('label',null,'New password (min. 6 characters)'),
          React.createElement('input',{value:newPass,onChange:e=>setNewPass(e.target.value),type:'password',placeholder:'New password',
            onKeyDown:e=>e.key==='Enter'&&handleResetPass()})),
        React.createElement('div',{style:{display:'flex',gap:10,marginTop:18,justifyContent:'flex-end'}},
          React.createElement('button',{onClick:()=>setResetModal(null)},'Cancel'),
          React.createElement('button',{className:'pri',onClick:handleResetPass},'Reset password')))),

    /* Confirm delete user */
    confirmDel&&React.createElement('div',{className:'modal-bg',onClick:()=>setConfirmDel(null)},
      React.createElement('div',{className:'modal',onClick:e=>e.stopPropagation()},
        React.createElement('div',{style:{fontSize:16,fontWeight:600,marginBottom:4}},'Remove user?'),
        React.createElement('div',{style:{fontSize:13,color:'var(--text2)',marginBottom:20}},
          'This will permanently remove ',React.createElement('strong',null,confirmDel.name),' from the portal. Their submittals will remain in the log.'),
        React.createElement('div',{style:{display:'flex',gap:10,justifyContent:'flex-end'}},
          React.createElement('button',{onClick:()=>setConfirmDel(null)},'Cancel'),

            React.createElement('i',{className:'ti ti-trash',style:{fontSize:13}}),'Remove user')))));
}

/* ══════════════════════════════════════════════════════════════════
   PROFILE MODAL
   ══════════════════════════════════════════════════════════════════ */
function ProfileModal({user,onClose,onUpdate}){
  const [tab,setTab]=useState('email');
  const [newEmail,setNewEmail]=useState(user.email||'');
  const [curPass,setCurPass]=useState('');
  const [newPass,setNewPass]=useState('');
  const [newPass2,setNewPass2]=useState('');
  const [err,setErr]=useState('');

  const saveEmail=async()=>{
    setErr('');
    const e=newEmail.trim().toLowerCase();
    if(!e)return setErr('Email cannot be empty.');
    if(e===user.email){onClose();return;}
    if(!curPass)return setErr('Enter your current password to confirm.');
    if(user.isAdmin){toast('Admin email cannot be changed.','error');return;}
    const all=await fbGetUsers();
    const rec=all[user.email];
    if(!rec)return setErr('Account not found.');
    if(rec.passHash!==btoa(unescape(encodeURIComponent(curPass))))return setErr('Current password is incorrect.');
    if(all[e]&&e!==user.email)return setErr('That email is already in use.');
    const updated={...rec,email:e};
    delete all[user.email];
    all[e]=updated;
    await fbSetUsers(all);
    onUpdate(updated);
    toast('Email updated.','success');
    onClose();
  };

  const savePass=async()=>{
    setErr('');
    if(!curPass)return setErr('Enter your current password.');
    if(newPass.length<6)return setErr('New password must be at least 6 characters.');
    if(newPass!==newPass2)return setErr('New passwords do not match.');
    if(user.isAdmin){toast('Admin password cannot be changed here.','error');return;}
    const all=await fbGetUsers();
    const rec=all[user.email];
    if(!rec)return setErr('Account not found.');
    if(rec.passHash!==btoa(unescape(encodeURIComponent(curPass))))return setErr('Current password is incorrect.');
    all[user.email]={...rec,passHash:btoa(unescape(encodeURIComponent(newPass)))};
    await fbSetUsers(all);
    toast('Password updated.','success');
    onClose();
  };

  const tabBtn=(id,label)=>React.createElement('button',{
    onClick:()=>{setTab(id);setErr('');},
    style:{flex:1,padding:'8px',fontSize:13,border:'none',borderRadius:'var(--r)',cursor:'pointer',
           background:tab===id?'var(--surface)':'transparent',
           fontWeight:tab===id?600:400,color:tab===id?'var(--text)':'var(--text2)',
           transition:'background .15s',boxShadow:tab===id?'0 1px 3px rgba(0,0,0,.08)':'none'}},label);

  return React.createElement('div',{className:'modal-bg',onClick:onClose},
    React.createElement('div',{className:'modal',onClick:e=>e.stopPropagation(),style:{maxWidth:420}},
      React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}},
        React.createElement('div',null,
          React.createElement('div',{style:{fontSize:16,fontWeight:600}},'My Profile'),
          React.createElement('div',{style:{fontSize:12,color:'var(--text3)',marginTop:2}},user.name+' · '+user.company)),
        React.createElement('button',{className:'ghost',onClick:onClose,style:{fontSize:18,padding:'2px 8px',color:'var(--text3)'}},'✕')),
      React.createElement('div',{style:{display:'flex',gap:4,marginBottom:20,background:'var(--bg)',borderRadius:'var(--r)',padding:4}},
        tabBtn('email','Change Email'),
        tabBtn('password','Change Password')),
      err&&React.createElement('div',{style:{background:'var(--danger-bg)',color:'var(--danger)',borderRadius:'var(--r)',padding:'9px 12px',fontSize:12,marginBottom:14,display:'flex',alignItems:'center',gap:6}},
        React.createElement('i',{className:'ti ti-alert-circle',style:{fontSize:14}}),err),
      tab==='email'&&React.createElement('div',{className:'sg'},
        React.createElement('div',null,
          React.createElement('label',null,'New email address'),
          React.createElement('input',{type:'email',value:newEmail,onChange:e=>setNewEmail(e.target.value),placeholder:'you@company.com'})),
        React.createElement('div',null,
          React.createElement('label',null,'Current password (to confirm)'),
          React.createElement('input',{type:'password',value:curPass,onChange:e=>setCurPass(e.target.value),placeholder:'Your current password',
            onKeyDown:e=>e.key==='Enter'&&saveEmail()})),
        React.createElement('div',{style:{display:'flex',gap:10,justifyContent:'flex-end',marginTop:4}},
          React.createElement('button',{onClick:onClose},'Cancel'),
          React.createElement('button',{className:'pri',onClick:saveEmail},'Save email'))),
      tab==='password'&&React.createElement('div',{className:'sg'},
        React.createElement('div',null,
          React.createElement('label',null,'Current password'),
          React.createElement('input',{type:'password',value:curPass,onChange:e=>setCurPass(e.target.value),placeholder:'Current password'})),
        React.createElement('div',null,
          React.createElement('label',null,'New password'),
          React.createElement('input',{type:'password',value:newPass,onChange:e=>setNewPass(e.target.value),placeholder:'Min. 6 characters'})),
        React.createElement('div',null,
          React.createElement('label',null,'Confirm new password'),
          React.createElement('input',{type:'password',value:newPass2,onChange:e=>setNewPass2(e.target.value),placeholder:'Repeat new password',
            onKeyDown:e=>e.key==='Enter'&&savePass()})),
        React.createElement('div',{style:{display:'flex',gap:10,justifyContent:'flex-end',marginTop:4}},
          React.createElement('button',{onClick:onClose},'Cancel'),
          React.createElement('button',{className:'pri',onClick:savePass},'Save password')))));
}

/* ══════════════════════════════════════════════════════════════════
   MAIN APP
   ══════════════════════════════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(null);
  const [submittals,setSubmittals]=useState([]);
  const [allUsers,setAllUsers]=useState([]);
  const [view,setView]=useState('dashboard');
  const [reviewTarget,setReviewTarget]=useState(null);
  const [form,setForm]=useState({specSection:'',description:'',attachment:null,notes:'',sendTo:''});
  const [submitting,setSubmitting]=useState(false);
  const [aiLoading,setAiLoading]=useState(false);
  const [filterDiv,setFilterDiv]=useState('all');
  const [filterStatus,setFilterStatus]=useState('all');
  const [search,setSearch]=useState('');
  const [darkMode,setDarkMode]=useState(()=>LS.get('ep_dark')||false);
  const [profileOpen,setProfileOpen]=useState(false);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',darkMode?'dark':'');
    LS.set('ep_dark',darkMode);
  },[darkMode]);

  const load=useCallback(async()=>{
    const [subs,u]=await Promise.all([fbGetSubmittals(),fbGetUsers()]);
    setSubmittals(subs);
    setAllUsers(Object.values(u));
  },[]);

  /* real-time listener: refresh whenever Firebase data changes */
  useEffect(()=>{
    if(!user)return;
    const refS=db.ref('ep_submittals');
    const refU=db.ref('ep_users');
    const onSubs=snap=>{if(snap.exists())setSubmittals(JSON.parse(snap.val()));};
    const onUsers=snap=>{if(snap.exists())setAllUsers(Object.values(JSON.parse(snap.val())));};
    refS.on('value',onSubs);
    refU.on('value',onUsers);
    return()=>{refS.off('value',onSubs);refU.off('value',onUsers);};
  },[user]);

  /* on login: load data, then run notification check */
  useEffect(()=>{
    if(!user)return;
    load();
    /* deferred notification check */
    setTimeout(async()=>{
      const sub=await fbGetSubmittals();
      const u=await fbGetUsers();
      const byId={};Object.values(u).forEach(x=>{byId[x.id]=x;byId[x.email]=x;});
      if(emailJsReady())runNotificationCheck(sub,byId);
    },2000);
  },[user,load]);

  const save=async s=>{await fbSetSubmittals(s);setSubmittals(s);};

  const handleSubmit=async()=>{
    if(!form.specSection||!form.description.trim()||!form.sendTo)return;
    setSubmitting(true);
    const section=SPEC_SECTIONS.find(s=>s.section===form.specSection);
    const recipient=allUsers.find(u=>u.id===form.sendTo);
    const ts=Date.now();
    const item={
      id:ts,no:String(submittals.length+1).padStart(3,'0'),
      specSection:form.specSection,sectionTitle:section?.title||'',division:section?.div||'',
      description:form.description.trim(),
      submittedBy:user.name,company:user.company,role:user.role,submittedById:user.id,
      sendTo:form.sendTo,sendToName:recipient?.name||'',sendToCompany:recipient?.company||'',
      dateSubmitted:fmtDate(ts),dateSubmittedTs:ts,
      status:'Pending',dateReviewed:'',reviewedBy:'',revision:'0',
      attachment:form.attachment||null,notes:form.notes.trim(),lastNotified:0,
    };
    const updated=[...submittals,item];
    save(updated);
    /* send initial notification */
    if(recipient?.email&&emailJsReady()){
      await sendEmail(recipient.email,recipient.name,
        '[New Submittal] #'+item.no+' – '+item.sectionTitle,
        'Hi '+recipient.name+',\n\nA new submittal has been sent to you for review:\n\n'+
        '  Submittal #:  '+item.no+'\n  Section:      '+item.specSection+' – '+item.sectionTitle+'\n'+
        '  Description:  '+item.description+'\n  Submitted by: '+user.name+' ('+user.company+')\n  Date:         '+item.dateSubmitted+
        '\n\nPlease log in to the portal to review this submittal:\nhttps://noemln.github.io/vigilant-bassoon/\n\n'+PROJECT+'\n'+OWNER);
      await fbSetSubmittals(updated.map(s=>s.id===ts?{...s,lastNotified:ts}:s));
    }
    setForm({specSection:'',description:'',attachment:null,notes:'',sendTo:''});
    setView('log');
    setSubmitting(false);
    toast('Submittal #'+item.no+' submitted.','success');
  };

  const handleAiAssist=async()=>{
    if(!form.description)return;
    setAiLoading(true);
    try{
      const list=SPEC_SECTIONS.map(s=>s.section+': '+s.title).join('\n');
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:50,
          messages:[{role:'user',content:'Submittal: "'+form.description+'"\n\nSections:\n'+list+'\n\nReply ONLY with the 6-digit section number.'}]})});
      const data=await res.json();
      const match=data.content?.[0]?.text?.trim().match(/\d{6}/)?.[0];
      if(match&&SPEC_SECTIONS.find(s=>s.section===match))setForm(f=>({...f,specSection:match}));
    }catch{}
    setAiLoading(false);
  };

  const handleReview=async(id,status,notes)=>{
    const updated=submittals.map(s=>s.id!==id?s:{...s,status,
      dateReviewed:fmtDate(Date.now()),reviewedBy:user.name,notes:notes||s.notes});
    save(updated);
    const s=updated.find(x=>x.id===id);
    /* notify submitter of outcome */
    const submitter=allUsers.find(u=>u.id===s?.submittedById);
    if(submitter?.email&&emailJsReady()&&s){
      await sendEmail(submitter.email,submitter.name,
        '[Submittal '+status+'] #'+s.no+' – '+s.sectionTitle,
        'Hi '+submitter.name+',\n\nYour submittal has been reviewed:\n\n'+
        '  Submittal #:  '+s.no+'\n  Section:      '+s.specSection+' – '+s.sectionTitle+'\n'+
        '  Decision:     '+status+'\n  Reviewed by:  '+user.name+'\n'+
        (notes?'  Notes:       '+notes+'\n':'')+
        '\nhttps://noemln.github.io/vigilant-bassoon/\n\n'+PROJECT+'\n'+OWNER);
    }
    toast('Review saved.','success');
  };

  if(!user)return React.createElement(AuthScreen,{onAuth:setUser});

  const canReview=user.role==='Architect/Engineer'||user.role==='Owner'||user.isAdmin;
  const stats={
    total:submittals.length,
    pending:submittals.filter(s=>s.status==='Pending').length,
    approved:submittals.filter(s=>s.status==='Approved'||s.status==='Approved as Noted').length,
    needsAction:submittals.filter(s=>s.status==='Revise & Resubmit'||s.status==='Rejected').length,
  };
  const filtered=submittals.filter(s=>{
    if(filterDiv!=='all'&&s.division!==filterDiv)return false;
    if(filterStatus!=='all'&&s.status!==filterStatus)return false;
    if(search&&!`${s.specSection} ${s.sectionTitle} ${s.description} ${s.submittedBy} ${s.company} ${s.sendToName}`.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  const TABS=[
    {id:'dashboard',label:'Dashboard',icon:'ti-layout-dashboard'},
    {id:'submit',label:'New submittal',icon:'ti-upload'},
    {id:'log',label:'Log ('+submittals.length+')',icon:'ti-list'},
    ...(canReview?[{id:'review',label:'Review ('+stats.pending+')',icon:'ti-clipboard-check'}]:[]),
    {id:'team',label:'Team ('+allUsers.filter(u=>!u.isAdmin).length+')',icon:'ti-users'},
    ...(user.isAdmin?[{id:'admin',label:'Admin',icon:'ti-shield'}]:[]),
  ];

  return React.createElement('div',{style:{fontFamily:'var(--font)',color:'var(--text)',minHeight:'100vh',background:'var(--bg)'}},
    /* Header */
    React.createElement('div',{style:{background:'var(--surface)',borderBottom:'1px solid var(--border)',padding:'13px 28px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,boxShadow:'0 1px 0 rgba(0,0,0,.04)'}},
      React.createElement('div',null,
        React.createElement('div',{style:{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:2}},OWNER),
        React.createElement('div',{style:{fontSize:15,fontWeight:600,letterSpacing:'-.3px'}},PROJECT+' — Submittal Portal')),
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
        /* Dark mode toggle — visible pill */
        React.createElement('button',{
          onClick:()=>setDarkMode(d=>!d),
          title:darkMode?'Switch to light mode':'Switch to dark mode',
          style:{
            display:'inline-flex',alignItems:'center',gap:6,
            padding:'6px 12px',borderRadius:99,fontSize:12,fontWeight:500,
            cursor:'pointer',border:'1px solid var(--border2)',
            background:darkMode?'#1c1f2a':'#f0ede6',
            color:darkMode?'#e6e4dc':'#18170f',
            transition:'background .2s,color .2s',
          }},
          React.createElement('i',{className:'ti '+(darkMode?'ti-sun':'ti-moon'),style:{fontSize:14}}),
          darkMode?'Light':'Dark'),
        /* Clickable profile area */
        React.createElement('button',{className:'ghost',onClick:()=>setProfileOpen(true),
          style:{display:'flex',alignItems:'center',gap:10,padding:'5px 10px',borderRadius:'var(--r)',cursor:'pointer',border:'1px solid transparent'},
          title:'My profile'},
          React.createElement(Avatar,{name:user.name,size:30,isAdmin:user.isAdmin}),
          React.createElement('div',{style:{textAlign:'right'}},
            React.createElement('div',{style:{fontSize:13,fontWeight:500}},user.name,
              user.isAdmin&&React.createElement('span',{className:'badge badge-admin',style:{marginLeft:6,fontSize:10}},'Admin')),
            React.createElement('div',{style:{fontSize:11,color:'var(--text3)'}},user.company+' · '+user.role))),
        React.createElement('button',{className:'ghost',onClick:()=>setUser(null),style:{fontSize:12,padding:'6px 12px',color:'var(--text2)',borderRadius:'var(--r)'}},
          React.createElement('i',{className:'ti ti-logout',style:{fontSize:14}}), ' Sign out'))),
    /* Nav */
    React.createElement('div',{style:{background:'var(--surface2)',borderBottom:'1px solid var(--border)',padding:'10px 28px',display:'flex',gap:4,flexWrap:'wrap',alignItems:'center'}},
      TABS.map(t=>React.createElement('button',{key:t.id,className:'tab'+(view===t.id?' active':''),onClick:()=>setView(t.id)},
        React.createElement('i',{className:'ti '+t.icon,style:{fontSize:14},ariaHidden:'true'}),t.label)),
      React.createElement('button',{className:'tab',onClick:load,style:{marginLeft:'auto'},title:'Refresh'},
        React.createElement('i',{className:'ti ti-refresh',style:{fontSize:14}}),'\u00a0Refresh')),
    /* Content */
    React.createElement('div',{style:{padding:'28px',maxWidth:1400}},
      view==='dashboard'&&React.createElement(Dashboard,{stats,submittals,setView}),
      view==='submit'&&React.createElement(SubmitForm,{form,setForm,onSubmit:handleSubmit,onAiAssist:handleAiAssist,submitting,aiLoading,user,allUsers}),
      view==='log'&&React.createElement(LogView,{submittals:filtered,filterDiv,setFilterDiv,filterStatus,setFilterStatus,search,setSearch,canReview,
        onClickReview:s=>{setReviewTarget(s.id);setView('review');}}),
      view==='review'&&canReview&&React.createElement(ReviewView,{submittals,onReview:handleReview,scrollTo:reviewTarget}),
      view==='team'&&React.createElement(TeamView,{allUsers,currentUser:user}),
      view==='admin'&&user.isAdmin&&React.createElement(AdminPanel,{submittals,onSaveSubmittals:save})),
    /* Profile modal */
    profileOpen&&React.createElement(ProfileModal,{user,onClose:()=>setProfileOpen(false),onUpdate:u=>{setUser(u);load();}}));
}

/* Spinner keyframe */
const style=document.createElement('style');
style.textContent='@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeInPop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}';
document.head.appendChild(style);

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
