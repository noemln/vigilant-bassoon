
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>East Picacho ES – Submittal Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/tabler-icons.min.css"/>

<style>
/* ── Reset & base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#fafaf8;
  --border:#e4e2dc;--border2:#cdcbc4;
  --text:#18170f;--text2:#64625a;--text3:#9e9b93;
  --accent:#1a5c3a;--accent-h:#145030;--accent-light:#e6f2ec;--accent-mid:#2d7a52;
  --warn-bg:#fff7e0;--warn:#8a5c09;
  --info-bg:#e6eefb;--info:#1a44a8;
  --success-bg:#e6f2ec;--success:#1a5c3a;
  --danger-bg:#fce8e8;--danger:#b01c1c;
  --r:6px;--rl:10px;--rxl:14px;
  --font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;min-height:100vh}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}

/* ── Form elements ── */
input,select,textarea{
  font-family:var(--font);font-size:14px;border-radius:var(--r);
  border:1px solid var(--border2);background:var(--surface);
  color:var(--text);padding:9px 12px;outline:none;
  transition:border-color .15s,box-shadow .15s;
  width:100%;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(26,92,58,.12);
}
textarea{resize:vertical;font-family:var(--font)}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}

/* ── Buttons ── */
button{
  font-family:var(--font);font-size:14px;font-weight:500;
  cursor:pointer;border-radius:var(--r);
  border:1px solid var(--border2);background:var(--surface);
  color:var(--text);padding:8px 16px;
  transition:background .12s,border-color .12s,box-shadow .12s;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
}
button:hover:not(:disabled){background:var(--bg)}
button:active:not(:disabled){transform:scale(.99)}
button.pri{background:var(--accent);color:#fff;border-color:var(--accent)}
button.pri:hover:not(:disabled){background:var(--accent-h);border-color:var(--accent-h)}
button.danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}
button.danger:hover:not(:disabled){background:#f8d0d0}
button.ghost{border-color:transparent;background:transparent}
button.ghost:hover:not(:disabled){background:var(--bg)}
button:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── Cards & layout ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow)}
.card-inset{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r)}
.sg{display:flex;flex-direction:column;gap:14px}
.sg2{display:flex;flex-direction:column;gap:8px}
.row{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;font-size:12px;font-weight:500;padding:3px 10px;border-radius:99px;white-space:nowrap;gap:4px}
.badge-warn{background:var(--warn-bg);color:var(--warn)}
.badge-info{background:var(--info-bg);color:var(--info)}
.badge-success{background:var(--success-bg);color:var(--success)}
.badge-danger{background:var(--danger-bg);color:var(--danger)}
.badge-gray{background:#ededea;color:var(--text2)}
.badge-admin{background:#1a5c3a;color:#fff}

/* ── Table ── */
table{border-collapse:collapse;width:100%}
th{text-align:left;font-size:12px;color:var(--text2);font-weight:600;
   text-transform:uppercase;letter-spacing:.06em;
   padding:11px 14px;border-bottom:1px solid var(--border);
   background:var(--surface2);white-space:nowrap}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:top}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface2)}

/* ── Nav tabs ── */
.tab{font-size:14px;padding:7px 16px;cursor:pointer;background:transparent;
     border:1px solid transparent;border-radius:var(--r);font-weight:400;
     color:var(--text2);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.tab.active{background:var(--surface);border-color:var(--border2);font-weight:500;color:var(--text);box-shadow:var(--shadow)}

/* ── Upload drop zone ── */
.dropzone{border:1.5px dashed var(--border2);border-radius:var(--r);padding:24px;
          text-align:center;cursor:pointer;transition:border-color .15s,background .15s;
          color:var(--text2);font-size:14px;background:var(--surface)}
.dropzone:hover,.dropzone.over{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-item{background:var(--text);color:#fff;padding:11px 18px;border-radius:var(--r);
            font-size:14px;opacity:0;transform:translateY(8px);
            transition:opacity .25s,transform .25s;pointer-events:none}
.toast-item.show{opacity:1;transform:translateY(0)}
.toast-item.success{background:var(--accent)}
.toast-item.error{background:var(--danger)}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);
          display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
.modal{background:var(--surface);border-radius:var(--rxl);padding:28px;
       width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}

/* ── Divider ── */
.divider{height:1px;background:var(--border);margin:4px 0}

/* ── Stat card ── */
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);
           padding:18px 20px;flex:1;min-width:130px;box-shadow:var(--shadow)}
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script>
'use strict';
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ══════════════════════════════════════════════════════════════════
   CONFIGURATION — fill these in after setting up EmailJS
   ══════════════════════════════════════════════════════════════════ */
const EMAILJS_CONFIG={
  publicKey:   '-bi9TS7wKHmWj_Iv3',   // from EmailJS → Account → General
  serviceId:   'service_7d9vp9p',           // from EmailJS → Email Services
  templateId:  'template_nerknkn',          // from EmailJS → Email Templates
};

/* Admin account — change this email/password before deploying */
const ADMIN_EMAIL='admin@gmail.com';
const ADMIN_PASS='Admin1234';

const PROJECT='East Picacho ES – HVAC & Reroof';
const OWNER='Las Cruces Public Schools';
const NOTIFY_INTERVAL_DAYS=2;

const SPEC_SECTIONS=[

  {div:'08',divName:'Openings',section:'083113',title:'Access Doors'},

  {div:'09',divName:'Finishes',section:'095100',title:'Acoustical Ceilings'},

  {div:'26',divName:'Electrical',section:'262816',title:'Circuit Breakers'},

];

const STATUSES=[
  {value:'Pending',          label:'Pending Review',    cls:'badge-warn'},
  {value:'Under Review',     label:'Under Review',      cls:'badge-info'},
  {value:'Approved',         label:'Approved',          cls:'badge-success'},
  {value:'Approved as Noted',label:'Approved as Noted', cls:'badge-success'},
  {value:'Revise & Resubmit',label:'Revise & Resubmit', cls:'badge-danger'},
  {value:'Rejected',         label:'Rejected',          cls:'badge-danger'},
];

const ROLES=['General Contractor','Subcontractor','Supplier','Owner','Architect/Engineer'];
const DIVISIONS=[...new Set(SPEC_SECTIONS.map(s=>s.div))];

/* ══════════════════════════════════════════════════════════════════
   STORAGE  (localStorage — works in any hosted HTML file)
   ══════════════════════════════════════════════════════════════════ */
const LS={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
};

/* ══════════════════════════════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════════════════════════════ */
function toast(msg,type=''){
  const el=document.createElement('div');
  el.className='toast-item'+(type?' '+type:'');
  el.textContent=msg;
  document.getElementById('toast').appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300)},3500);
}

/* ══════════════════════════════════════════════════════════════════
   EMAIL  (EmailJS)
   ══════════════════════════════════════════════════════════════════ */
function emailJsReady(){
  return EMAILJS_CONFIG.publicKey!=='YOUR_EMAILJS_PUBLIC_KEY';
}

async function sendEmail(toEmail,toName,subject,body){
  if(!emailJsReady()){
    console.warn('EmailJS not configured — skipping email to',toEmail);
    return false;
  }
  try{
    emailjs.init(EMAILJS_CONFIG.publicKey);
    await emailjs.send(EMAILJS_CONFIG.serviceId,EMAILJS_CONFIG.templateId,{
      to_email:toEmail,
      to_name:toName,
      subject,
      message:body,
      project:PROJECT,
      owner:OWNER,
    });
    return true;
  }catch(e){
    console.error('EmailJS error',e);
    return false;
  }
}

/* Check pending submittals and send reminder emails if due */
async function runNotificationCheck(submittals,users){
  if(!emailJsReady())return;
  const now=Date.now();
  const intervalMs=NOTIFY_INTERVAL_DAYS*24*60*60*1000;
  const updated=[...submittals];
  let changed=false;

  for(let i=0;i<updated.length;i++){
    const s=updated[i];
    if(s.status!=='Pending'&&s.status!=='Under Review')continue;
    const lastNotified=s.lastNotified||s.dateSubmittedTs||0;
    if(now-lastNotified<intervalMs)continue;

    const recipient=users[s.sendTo];
    if(!recipient?.email)continue;

    const subject=`[Action Required] Submittal #${s.no} – ${s.sectionTitle}`;
    const body=`Hi ${recipient.name},\n\nYou have a submittal pending your review:\n\n`+
      `  Submittal #:  ${s.no}\n`+
      `  Section:      ${s.specSection} – ${s.sectionTitle}\n`+
      `  Description:  ${s.description}\n`+
      `  Submitted by: ${s.submittedBy} (${s.company})\n`+
      `  Date:         ${s.dateSubmitted}\n\n`+
      `Please log in to the portal to review and approve or return this submittal https://genuine-mermaid-8fb59a.netlify.app/.\n\n`+
      `${PROJECT}\n${OWNER}`;

    const ok=await sendEmail(recipient.email,recipient.name,subject,body);
    if(ok){
      updated[i]={...s,lastNotified:now};
      changed=true;
    }
  }
  if(changed)LS.set('ep_submittals',updated);
  return updated;
}

/* ══════════════════════════════════════════════════════════════════
   UTILITIES
   ══════════════════════════════════════════════════════════════════ */
function toBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

function fmtDate(ts){
  return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function daysSince(ts){
  return Math.floor((Date.now()-ts)/(1000*60*60*24));
}

/* ══════════════════════════════════════════════════════════════════
   SMALL UI COMPONENTS
   ══════════════════════════════════════════════════════════════════ */
function Badge({status}){
  const cfg=STATUSES.find(s=>s.value===status)||STATUSES[0];
  return React.createElement('span',{className:'badge '+cfg.cls},cfg.label);
}

function Avatar({name,size=32,isAdmin}){
  const initials=(name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  return React.createElement('div',{
    style:{width:size,height:size,borderRadius:'50%',
           background:isAdmin?'#1a5c3a':'var(--accent-light)',
           color:isAdmin?'#fff':'var(--accent)',
           display:'flex',alignItems:'center',justifyContent:'center',
           fontWeight:600,fontSize:size*0.35,flexShrink:0,fontFamily:'var(--mono)'}
  },initials);
}

function Spinner(){
  return React.createElement('span',{style:{display:'inline-block',width:14,height:14,
    border:'2px solid rgba(255,255,255,.4)',borderTopColor:'#fff',
    borderRadius:'50%',animation:'spin .6s linear infinite'}});
}

/* ══════════════════════════════════════════════════════════════════
   AUTH SCREEN
   ══════════════════════════════════════════════════════════════════ */
function AuthScreen({onAuth}){
  const [mode,setMode]=useState('login');
  const [f,setF]=useState({name:'',company:'',role:ROLES[0],email:'',pass:'',pass2:''});
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const upd=k=>e=>setF(p=>({...p,[k]:e.target.value}));

  const handleSignup=()=>{
    setErr('');
    if(!f.name.trim()||!f.company.trim()||!f.email.trim()||!f.pass)return setErr('All fields are required.');
    if(f.pass.length<6)return setErr('Password must be at least 6 characters.');
    if(f.pass!==f.pass2)return setErr('Passwords do not match.');
    const users=LS.get('ep_users')||{};
    const key=f.email.trim().toLowerCase();
    if(users[key])return setErr('An account with that email already exists.');
    const user={id:'u_'+Date.now(),name:f.name.trim(),company:f.company.trim(),
                role:f.role,email:key,passHash:btoa(unescape(encodeURIComponent(f.pass))),isAdmin:false};
    users[key]=user;
    LS.set('ep_users',users);
    toast('Account created — welcome!','success');
    onAuth(user);
  };

  const handleLogin=()=>{
    setErr('');
    if(!f.email.trim()||!f.pass)return setErr('Email and password required.');
    /* admin shortcut */
    if(f.email.trim().toLowerCase()===ADMIN_EMAIL.toLowerCase()&&f.pass===ADMIN_PASS){
      onAuth({id:'admin',name:'Admin',company:OWNER,role:'Admin',email:ADMIN_EMAIL,isAdmin:true});
      return;
    }
    const users=LS.get('ep_users')||{};
    const key=f.email.trim().toLowerCase();
    const user=users[key];
    if(!user||user.passHash!==btoa(unescape(encodeURIComponent(f.pass))))return setErr('Incorrect email or password.');
    toast('Welcome back, '+user.name+'!','success');
    onAuth(user);
  };

  const submit=()=>mode==='login'?handleLogin():handleSignup();

  return React.createElement('div',{style:{maxWidth:420,margin:'60px auto',padding:'0 20px'}},
    React.createElement('div',{className:'card',style:{padding:'36px'}},
      React.createElement('div',{style:{marginBottom:26}},
        React.createElement('div',{style:{fontFamily:'var(--mono)',fontSize:10,fontWeight:500,color:'var(--text3)',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:8}},OWNER),
        React.createElement('div',{style:{fontSize:22,fontWeight:600,letterSpacing:'-.4px',lineHeight:1.2}},PROJECT),
        React.createElement('div',{style:{fontSize:13,color:'var(--text2)',marginTop:6}},'Submittal Exchange Portal')
      ),
      React.createElement('div',{style:{display:'flex',gap:4,marginBottom:22,background:'var(--bg)',borderRadius:'var(--r)',padding:4}},
        ['login','signup'].map(m=>React.createElement('button',{key:m,onClick:()=>{setMode(m);setErr('');},
          style:{flex:1,padding:'7px',fontSize:13,border:'none',borderRadius:'var(--r)',cursor:'pointer',
                 background:mode===m?'var(--surface)':'transparent',
                 fontWeight:mode===m?600:400,color:mode===m?'var(--text)':'var(--text2)',
                 transition:'background .15s',boxShadow:mode===m?'0 1px 3px rgba(0,0,0,.08)':'none'}},
          m==='login'?'Sign in':'Create account'))
      ),
      err&&React.createElement('div',{style:{background:'var(--danger-bg)',color:'var(--danger)',borderRadius:'var(--r)',padding:'9px 12px',fontSize:12,marginBottom:14,display:'flex',alignItems:'center',gap:6}},
        React.createElement('i',{className:'ti ti-alert-circle',style:{fontSize:14}}),err),
      React.createElement('div',{className:'sg'},
        mode==='signup'&&React.createElement('div',null,
          React.createElement('label',null,'Full name'),
          React.createElement('input',{value:f.name,onChange:upd('name'),placeholder:'Jane Smith'})),
        mode==='signup'&&React.createElement('div',null,
          React.createElement('label',null,'Company'),
          React.createElement('input',{value:f.company,onChange:upd('company'),placeholder:'Company name'})),
        mode==='signup'&&React.createElement('div',null,
          React.createElement('label',null,'Role'),
          React.createElement('select',{value:f.role,onChange:upd('role')},
            ROLES.map(r=>React.createElement('option',{key:r},r)))),
        React.createElement('div',null,
          React.createElement('label',null,'Email address'),
          React.createElement('input',{value:f.email,onChange:upd('email'),placeholder:'you@company.com',type:'email'})),
        React.createElement('div',null,
          React.createElement('label',null,'Password'),
          React.createElement('input',{value:f.pass,onChange:upd('pass'),placeholder:mode==='signup'?'Min. 6 characters':'Password',type:'password'})),
        mode==='signup'&&React.createElement('div',null,
          React.createElement('label',null,'Confirm password'),
          React.createElement('input',{value:f.pass2,onChange:upd('pass2'),placeholder:'Repeat password',type:'password',
            onKeyDown:e=>e.key==='Enter'&&submit()})),
        React.createElement('button',{className:'pri',onClick:submit,disabled:loading,
          style:{padding:'10px',fontSize:14,marginTop:4,justifyContent:'center'}},
          loading?React.createElement(Spinner):null,
          mode==='login'?'Sign in →':'Create account →')
      )
    )
  );
}

/* ══════════════════════════════════════════════════════════════════
   FILE DROP ZONE
   ══════════════════════════════════════════════════════════════════ */
function FileDropZone({onFile,file}){
  const [over,setOver]=useState(false);
  const inp=useRef();
  const handle=async f=>{
    if(!f)return;
    if(f.size>5*1024*1024){toast('File must be under 5 MB.','error');return;}
    const data=await toBase64(f);
    onFile({name:f.name,type:f.type,size:f.size,data});
  };
  return React.createElement('div',null,
    React.createElement('div',{
      className:'dropzone'+(over?' over':''),
      onClick:()=>inp.current.click(),
      onDragOver:e=>{e.preventDefault();setOver(true)},

    React.createElement('div',{className:'card',style:{padding:'20px',marginBottom:24}},
      React.createElement('div',{style:{fontSize:13,color:'var(--text2)',marginBottom:14}},
        'Reminders are sent automatically every ',
        React.createElement('strong',null,NOTIFY_INTERVAL_DAYS+' days'),
        ' to any reviewer with pending submittals when the portal is opened. You can also trigger them manually below.'),
      React.createElement('div',{style:{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}},
        React.createElement('button',{onClick:handleSendReminders,disabled:notifStatus==='sending',style:{padding:'8px 18px'}},
          notifStatus==='sending'?[React.createElement(Spinner,{key:'s'}),' Sending…']:[React.createElement('i',{className:'ti ti-send',key:'i',style:{fontSize:14}}),' Send reminders now']),
        !emailConfigured&&React.createElement('span',{style:{fontSize:12,color:'var(--warn)'}},
          React.createElement('i',{className:'ti ti-alert-circle',style:{marginRight:4}}),'Configure EmailJS first'))),

    /* EmailJS setup instructions */
    React.createElement('div',{style:{fontSize:17,fontWeight:600,marginBottom:14}},'EmailJS setup (2 min)'),
    React.createElement('div',{className:'card',style:{padding:'20px'}},
      React.createElement('ol',{style:{fontSize:13,color:'var(--text2)',lineHeight:2,paddingLeft:20}},
        React.createElement('li',null,'Go to ',React.createElement('a',{href:'https://www.emailjs.com',target:'_blank',style:{color:'var(--accent)'}},'emailjs.com'),' and create a free account.'),
        React.createElement('li',null,'Add an Email Service (Gmail, Outlook, etc.) under ',React.createElement('strong',null,'Email Services'),' — copy the Service ID.'),
        React.createElement('li',null,'Create a template under ',React.createElement('strong',null,'Email Templates'),'. Use these variables in the template body:',
          React.createElement('div',{style:{fontFamily:'var(--mono)',fontSize:12,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'10px 14px',margin:'8px 0',lineHeight:2}},
            '{{to_name}} — recipient name\n{{subject}} — email subject\n{{message}} — full message body\n{{project}} — project name\n{{to_email}} — recipient email (set as "To email" field)')),
        React.createElement('li',null,'Copy your ',React.createElement('strong',null,'Public Key'),' from Account → General.'),
        React.createElement('li',null,'Open this HTML file in any text editor, find the ',
          React.createElement('code',{style:{fontFamily:'var(--mono)',fontSize:12}},'EMAILJS_CONFIG'),
          ' block near the top, and replace the placeholder values with your real IDs.'),
        React.createElement('li',null,'Save and re-upload the file. Emails will now send automatically.'))),

    /* Reset password modal */
    resetModal&&React.createElement('div',{className:'modal-bg',onClick:()=>setResetModal(null)},
      React.createElement('div',{className:'modal',onClick:e=>e.stopPropagation()},
        React.createElement('div',{style:{fontSize:16,fontWeight:600,marginBottom:4}},'Reset password'),
        React.createElement('div',{style:{fontSize:13,color:'var(--text2)',marginBottom:18}},'Setting new password for ',React.createElement('strong',null,resetModal.name)),
        React.createElement('div',{className:'sg2'},
          React.createElement('label',null,'New password (min. 6 characters)'),
          React.createElement('input',{value:newPass,onChange:e=>setNewPass(e.target.value),type:'password',placeholder:'New password',
            onKeyDown:e=>e.key==='Enter'&&handleResetPass()})),
        React.createElement('div',{style:{display:'flex',gap:10,marginTop:18,justifyContent:'flex-end'}},
          React.createElement('button',{onClick:()=>setResetModal(null)},'Cancel'),
          React.createElement('button',{className:'pri',onClick:handleResetPass},'Reset password')))),

    confirmDel&&React.createElement('div',{className:'modal-bg',onClick:()=>setConfirmDel(null)},
      React.createElement('div',{className:'modal',onClick:e=>e.stopPropagation()},
        React.createElement('div',{style:{fontSize:16,fontWeight:600,marginBottom:4}},'Remove user?'),

          'This will permanently remove ',React.createElement('strong',null,confirmDel.name),' from the portal. Their submittals will remain in the log.'),
        React.createElement('div',{style:{display:'flex',gap:10,justifyContent:'flex-end'}},

            React.createElement('i',{className:'ti ti-trash',style:{fontSize:13}}),'Remove user')))));

/* ══════════════════════════════════════════════════════════════════
   MAIN APP
   ══════════════════════════════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(null);
  const [submittals,setSubmittals]=useState([]);
  const [allUsers,setAllUsers]=useState([]);
  const [view,setView]=useState('dashboard');
  const [reviewTarget,setReviewTarget]=useState(null);
  const [form,setForm]=useState({specSection:'',description:'',attachment:null,notes:'',sendTo:''});
  const [submitting,setSubmitting]=useState(false);
  const [aiLoading,setAiLoading]=useState(false);
  const [filterDiv,setFilterDiv]=useState('all');
  const [filterStatus,setFilterStatus]=useState('all');
  const [search,setSearch]=useState('');

  const load=useCallback(()=>{
    setSubmittals(LS.get('ep_submittals')||[]);
    const u=LS.get('ep_users')||{};
    setAllUsers(Object.values(u));
  },[]);

  /* on login: load data, then run notification check */
  useEffect(()=>{
    if(!user)return;
    load();
    /* deferred notification check */
    setTimeout(async()=>{
      const sub=LS.get('ep_submittals')||[];
      const u=LS.get('ep_users')||{};
      const byId={};Object.values(u).forEach(x=>{byId[x.id]=x;byId[x.email]=x;});
      if(emailJsReady())runNotificationCheck(sub,byId);
    },2000);
  },[user,load]);

  const save=s=>{LS.set('ep_submittals',s);setSubmittals(s);};

  const handleSubmit=async()=>{
    if(!form.specSection||!form.description.trim()||!form.sendTo)return;
    setSubmitting(true);
    const section=SPEC_SECTIONS.find(s=>s.section===form.specSection);
    const recipient=allUsers.find(u=>u.id===form.sendTo);
    const ts=Date.now();
    const item={
      id:ts,no:String(submittals.length+1).padStart(3,'0'),
      specSection:form.specSection,sectionTitle:section?.title||'',division:section?.div||'',
      description:form.description.trim(),
      submittedBy:user.name,company:user.company,role:user.role,submittedById:user.id,
      sendTo:form.sendTo,sendToName:recipient?.name||'',sendToCompany:recipient?.company||'',
      dateSubmitted:fmtDate(ts),dateSubmittedTs:ts,
      status:'Pending',dateReviewed:'',reviewedBy:'',revision:'0',
      attachment:form.attachment||null,notes:form.notes.trim(),lastNotified:0,
    };
    const updated=[...submittals,item];
    save(updated);
    /* send initial notification */
    if(recipient?.email&&emailJsReady()){
      await sendEmail(recipient.email,recipient.name,
        '[New Submittal] #'+item.no+' – '+item.sectionTitle,
        'Hi '+recipient.name+',\n\nA new submittal has been sent to you for review:\n\n'+
        '  Submittal #:  '+item.no+'\n  Section:      '+item.specSection+' – '+item.sectionTitle+'\n'+
        '  Description:  '+item.description+'\n  Submitted by: '+user.name+' ('+user.company+')\n  Date:         '+item.dateSubmitted+
        '\n\nPlease log in to the portal to review this submittal:\nhttps://genuine-mermaid-8fb59a.netlify.app/\n\n'+PROJECT+'\n'+OWNER);
      LS.set('ep_submittals',updated.map(s=>s.id===ts?{...s,lastNotified:ts}:s));
    }
    setForm({specSection:'',description:'',attachment:null,notes:'',sendTo:''});
    setView('log');
    setSubmitting(false);
    toast('Submittal #'+item.no+' submitted.','success');
  };

  const handleAiAssist=async()=>{
    if(!form.description)return;
    setAiLoading(true);
    try{
      const list=SPEC_SECTIONS.map(s=>s.section+': '+s.title).join('\n');
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:50,
          messages:[{role:'user',content:'Submittal: "'+form.description+'"\n\nSections:\n'+list+'\n\nReply ONLY with the 6-digit section number.'}]})});
      const data=await res.json();
      const match=data.content?.[0]?.text?.trim().match(/\d{6}/)?.[0];
      if(match&&SPEC_SECTIONS.find(s=>s.section===match))setForm(f=>({...f,specSection:match}));
    }catch{}
    setAiLoading(false);
  };

  const handleReview=async(id,status,notes)=>{
    const updated=submittals.map(s=>s.id!==id?s:{...s,status,
      dateReviewed:fmtDate(Date.now()),reviewedBy:user.name,notes:notes||s.notes});
    save(updated);
    const s=updated.find(x=>x.id===id);
    /* notify submitter of outcome */
    const submitter=allUsers.find(u=>u.id===s?.submittedById);
    if(submitter?.email&&emailJsReady()&&s){
      await sendEmail(submitter.email,submitter.name,
        '[Submittal '+status+'] #'+s.no+' – '+s.sectionTitle,
        'Hi '+submitter.name+',\n\nYour submittal has been reviewed:\n\n'+
        '  Submittal #:  '+s.no+'\n  Section:      '+s.specSection+' – '+s.sectionTitle+'\n'+
        '  Decision:     '+status+'\n  Reviewed by:  '+user.name+'\n'+
        (notes?'  Notes:       '+notes+'\n':'')+
        '\nhttps://genuine-mermaid-8fb59a.netlify.app/\n\n'+PROJECT+'\n'+OWNER);
    }
    toast('Review saved.','success');
  };

  if(!user)return React.createElement(AuthScreen,{onAuth:setUser});

  const canReview=user.role==='Architect/Engineer'||user.role==='Owner'||user.isAdmin;
  const stats={
    total:submittals.length,
    pending:submittals.filter(s=>s.status==='Pending').length,
    approved:submittals.filter(s=>s.status==='Approved'||s.status==='Approved as Noted').length,
    needsAction:submittals.filter(s=>s.status==='Revise & Resubmit'||s.status==='Rejected').length,
  };
  const filtered=submittals.filter(s=>{
    if(filterDiv!=='all'&&s.division!==filterDiv)return false;
    if(filterStatus!=='all'&&s.status!==filterStatus)return false;
    if(search&&!`${s.specSection} ${s.sectionTitle} ${s.description} ${s.submittedBy} ${s.company} ${s.sendToName}`.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  const TABS=[
    {id:'dashboard',label:'Dashboard',icon:'ti-layout-dashboard'},
    {id:'submit',label:'New submittal',icon:'ti-upload'},
    {id:'log',label:'Log ('+submittals.length+')',icon:'ti-list'},
    ...(canReview?[{id:'review',label:'Review ('+stats.pending+')',icon:'ti-clipboard-check'}]:[]),
    {id:'team',label:'Team ('+allUsers.filter(u=>!u.isAdmin).length+')',icon:'ti-users'},
    ...(user.isAdmin?[{id:'admin',label:'Admin',icon:'ti-shield'}]:[]),
  ];

  return React.createElement('div',{style:{fontFamily:'var(--font)',color:'var(--text)',minHeight:'100vh',background:'var(--bg)'}},
    /* Header */
    React.createElement('div',{style:{background:'var(--surface)',borderBottom:'1px solid var(--border)',padding:'13px 28px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,boxShadow:'0 1px 0 rgba(0,0,0,.04)'}},
      React.createElement('div',null,
        React.createElement('div',{style:{fontFamily:'var(--mono)',fontSize:10,color:'var(--text3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:2}},OWNER),
        React.createElement('div',{style:{fontSize:15,fontWeight:600,letterSpacing:'-.3px'}},PROJECT+' — Submittal Portal')),
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10}},
        React.createElement(Avatar,{name:user.name,size:30,isAdmin:user.isAdmin}),
        React.createElement('div',{style:{textAlign:'right'}},
          React.createElement('div',{style:{fontSize:13,fontWeight:500}},user.name,
            user.isAdmin&&React.createElement('span',{className:'badge badge-admin',style:{marginLeft:6,fontSize:10}},'Admin')),
          React.createElement('div',{style:{fontSize:11,color:'var(--text3)'}},user.company+' · '+user.role)),
        React.createElement('button',{className:'ghost',onClick:()=>setUser(null),style:{fontSize:11,padding:'4px 10px',color:'var(--text2)'}},'Sign out'))),
    /* Nav */
    React.createElement('div',{style:{background:'var(--surface2)',borderBottom:'1px solid var(--border)',padding:'10px 28px',display:'flex',gap:4,flexWrap:'wrap',alignItems:'center'}},
      TABS.map(t=>React.createElement('button',{key:t.id,className:'tab'+(view===t.id?' active':''),onClick:()=>setView(t.id)},
        React.createElement('i',{className:'ti '+t.icon,style:{fontSize:14},ariaHidden:'true'}),t.label)),
      React.createElement('button',{className:'tab',onClick:load,style:{marginLeft:'auto'},title:'Refresh'},
        React.createElement('i',{className:'ti ti-refresh',style:{fontSize:14}}),'\u00a0Refresh')),
    /* Content */
    React.createElement('div',{style:{padding:'28px',maxWidth:1400}},
      view==='dashboard'&&React.createElement(Dashboard,{stats,submittals,setView}),
      view==='submit'&&React.createElement(SubmitForm,{form,setForm,onSubmit:handleSubmit,onAiAssist:handleAiAssist,submitting,aiLoading,user,allUsers}),
      view==='log'&&React.createElement(LogView,{submittals:filtered,filterDiv,setFilterDiv,filterStatus,setFilterStatus,search,setSearch,canReview,
        onClickReview:s=>{setReviewTarget(s.id);setView('review');}}),
      view==='review'&&canReview&&React.createElement(ReviewView,{submittals,onReview:handleReview,scrollTo:reviewTarget}),
      view==='team'&&React.createElement(TeamView,{allUsers,currentUser:user}),
      view==='admin'&&user.isAdmin&&React.createElement(AdminPanel,{submittals,onSaveSubmittals:save})));
}

/* Spinner keyframe */
const style=document.createElement('style');
style.textContent='@keyframes spin{to{transform:rotate(360deg)}}';
document.head.appendChild(style);

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
